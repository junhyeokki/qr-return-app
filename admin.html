<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Warranty Admin - Anyang Center</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1c69d4; --bg: #f4f7f9; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-print { background: var(--primary); color: white; }
        .btn-match { background: #000; color: white; padding: 6px 10px; font-size: 12px; }
        .status-ok { color: var(--success); font-weight: 800; font-size: 13px; margin-left: 8px; }
        .status-err { color: var(--danger); font-weight: 800; font-size: 13px; margin-left: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }

        /* 인쇄 레이아웃 고정 (이전과 동일) */
        @media print {
            @page { size: A4; margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 210mm; display: grid !important; grid-template-columns: 105mm 105mm; grid-auto-rows: 74.25mm; }
            .label-card { width: 105mm; height: 74.25mm; border: 0.1mm solid #000; box-sizing: border-box; display: flex !important; padding: 8mm; align-items: center; page-break-inside: avoid; }
            .qr-side { width: 35mm; }
            .qr-side img { width: 32mm !important; height: 32mm !important; }
            .info-side { flex: 1; margin-left: 6mm; }
            .data-box { border-top: 2px solid #000; margin-top: 4mm; padding-top: 3mm; }
            .val-text { font-family: 'JetBrains Mono'; font-size: 17pt; font-weight: 800; }
        }
        #print-area { display: none; }
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        #reader { width: 90%; max-width: 450px; background: white; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h2>📦 BMW 고품 관리 (삼천리 안양)</h2>
        <button class="btn btn-print" onclick="printSelected()">📄 선택 항목 병합 인쇄</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width:30px;"><input type="checkbox" onclick="toggleAll(this)"></th>
                <th>QR</th>
                <th>차대번호</th>
                <th>부품 정보</th>
                <th>검수 및 매칭</th>
                <th>기능</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<div id="scanner-modal">
    <div style="color:white; margin-bottom:10px;">공식 고품출고서 QR을 스캔하세요</div>
    <div id="reader"></div>
    <button class="btn" style="margin-top:20px; background:white;" onclick="closeScanner()">❌ 닫기</button>
</div>

<div id="print-area"></div>

<script>
    const SURL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SKEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SURL, SKEY);
    
    let masterData = [];
    let html5QrCode;

    window.onload = fetchData;

    async function fetchData() {
        const { data } = await sb.from('qr_returns').select('*').order('created_at', { ascending: false });
        masterData = data || [];
        renderList(masterData);
    }

    function renderList(data) {
        document.getElementById('list-body').innerHTML = data.map(item => {
            // 일치 여부 확인 로직
            const isMatched = item.bmw_qr_code ? true : false;
            
            return `
            <tr>
                <td><input type="checkbox" class="row-check" value="${item.id}"></td>
                <td><img style="width:45px;" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}"></td>
                <td style="font-family:'JetBrains Mono'; font-weight:700;">${item.차대번호}</td>
                <td><strong>${item.품번}</strong><br><small>${item.품명}</small></td>
                <td>
                    ${isMatched ? `<span class="status-ok">✅ 수거 완료</span>` : 
                    `<button class="btn btn-match" onclick="startIntegratedScan('${item.id}', '${item.차대번호}', '${item.품번}')">🔍 공식 QR 매칭</button>`}
                </td>
                <td>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <button onclick="printSingle('${item.id}')" style="cursor:pointer; padding:4px 8px;">인쇄</button>
                        <button onclick="deleteItem('${item.id}')" style="color:#ccc; border:none; background:none; cursor:pointer; font-size:11px;">삭제</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    // 📱 [통합 스캔 및 판독 로직]
    function startIntegratedScan(id, originVin, originPart) {
        document.getElementById('scanner-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (decodedText) => {
            const f = decodedText.split(',');
            if (f.length < 12) return alert("올바른 공식 QR 형식이 아닙니다.");

            const scVin = f[2]; // 스캔된 차대번호
            const scPart = f[9]; // 스캔된 품번

            // 일치 불일치 판독 (차대번호는 뒤 7자리 비교, 품번은 전체 비교)
            const isVinMatch = originVin.includes(scVin) || scVin.includes(originVin.slice(-7));
            const isPartMatch = originPart.replace(/[^a-zA-Z0-9]/g, '') === scPart.replace(/[^a-zA-Z0-9]/g, '');

            if (isVinMatch && isPartMatch) {
                if(confirm(`[판독 결과: 일치]\n차대: ${scVin}\n품번: ${scPart}\n수거 완료 처리하시겠습니까?`)) {
                    await sb.from('qr_returns').update({
                        bmw_qr_code: decodedText,
                        차대번호: scVin,
                        품번: scPart,
                        교환일: `20${f[7].substring(0,2)}-${f[7].substring(2,4)}-${f[7].substring(4,6)}`
                    }).eq('id', id);
                    closeScanner(); fetchData();
                }
            } else {
                alert(`⚠️ 정보 불일치!\n\n[기존] 차대:${originVin} / 품번:${originPart}\n[스캔] 차대:${scVin} / 품번:${scPart}\n\n다시 확인해 주세요.`);
                closeScanner();
            }
        });
    }

    // 개별 인쇄 함수 (고정된 레이아웃 사용)
    function printSingle(id) {
        const item = masterData.find(i => String(i.id) === String(id));
        if(!item) return;
        document.getElementById('print-area').innerHTML = makeLabelHtml(item);
        document.getElementById('print-area').style.display = 'grid';
        setTimeout(() => { window.print(); document.getElementById('print-area').style.display = 'none'; }, 300);
    }

    function makeLabelHtml(item) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}`;
        return `
            <div class="label-card">
                <div class="qr-side"><img src="${qrUrl}"></div>
                <div class="info-side">
                    <div style="font-size:12px; font-weight:700;">날짜: ${item.교환일} / 작업자: ${item.작업자}</div>
                    <div style="font-size:12px; font-weight:700; margin-top:2px;">품명: ${item.품명}</div>
                    <div class="data-box">
                        <div style="font-size:9px; font-weight:bold;">PART NUMBER</div>
                        <div class="val-text">${item.품번}</div>
                        <div style="font-size:9px; font-weight:bold; margin-top:5px;">VIN (LAST 7)</div>
                        <div class="val-text">${item.차대번호.slice(-7)}</div>
                    </div>
                </div>
            </div>`;
    }

    function printSelected() {
        const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(c => c.value);
        if(!ids.length) return alert("항목을 선택하세요.");
        const targets = masterData.filter(i => ids.includes(String(i.id)));
        document.getElementById('print-area').innerHTML = targets.map(t => makeLabelHtml(t)).join('');
        document.getElementById('print-area').style.display = 'grid';
        setTimeout(() => { window.print(); document.getElementById('print-area').style.display = 'none'; }, 500);
    }

    function closeScanner() { if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-modal').style.display='none'); }
    function toggleAll(src) { document.querySelectorAll('.row-check').forEach(c => c.checked = src.checked); }
    async function deleteItem(id) { if(confirm("삭제할까요?")) { await sb.from('qr_returns').delete().eq('id', id); fetchData(); } }
</script>
</body>
</html>
