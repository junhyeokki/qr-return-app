<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고품 관리자 모드</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; padding: 30px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #f1f3f5; color: #495057; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .qr-thumb { width: 60px; height: 60px; border: 1px solid #eee; border-radius: 4px; cursor: pointer; }
        .qr-thumb:hover { transform: scale(3); transition: 0.2s; position: relative; z-index: 10; background: white; }
        .btn-print { padding: 8px 16px; background: #3ecf8e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        @media print { .btn-print { display: none; } }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>
        📦 고품 반납 관리 리스트
        <button class="btn-print" onclick="window.print()">페이지 인쇄</button>
    </h1>

    <table>
        <thead>
            <tr>
                <th>QR</th>
                <th>차대번호</th>
                <th>품번 / 품명</th>
                <th>교환일</th>
                <th>작업자</th>
                <th>수리항목</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchAdminData() {
        const { data, error } = await sb
            .from('qr_returns')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            alert('데이터 로드 실패: ' + error.message);
            return;
        }

        const tableBody = document.getElementById('admin-table-body');
        tableBody.innerHTML = data.map(item => `
            <tr>
                <td>
                    <img class="qr-thumb" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}" alt="QR">
                </td>
                <td style="font-family: monospace; font-weight: bold;">${item.차대번호 || '-'}</td>
                <td>
                    <div style="font-weight: 600;">${item.품번}</div>
                    <div style="font-size: 12px; color: #666;">${item.품명}</div>
                </td>
                <td>${item.교환일}</td>
                <td>${item.작업자}</td>
                <td>${item.수리항목 || '-'}</td>
            </tr>
        `).join('');
    }

    fetchAdminData();
</script>
</body>
</html>
