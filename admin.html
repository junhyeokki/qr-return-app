<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Warranty Admin - Final System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1c69d4; --bg: #f4f7f9; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .admin-container { max-width: 1240px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .top-btns { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; font-size: 14px; }
        .btn-excel { background: #157347; color: white; }
        .btn-print-main { background: var(--primary); color: white; }
        .btn-match { background: var(--success); color: white; padding: 6px 12px; font-size: 13px; border-radius: 20px; }
        .btn-del { background: #fff1f1; color: var(--danger); border: 1px solid #ffebeb; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        .btn-row-print { background: #f8f9fa; color: #334155; border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        .filter-bar { display: flex; align-items: center; gap: 12px; background: #f0f4f8; padding: 15px 20px; border-radius: 10px; margin-bottom: 25px; font-size: 14px; }
        .filter-bar input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 13px; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        /* 수거 완료 텍스트 스타일 */
        .status-tag { font-weight: 800; color: var(--success); background: #f0fdf4; padding: 4px 10px; border-radius: 15px; font-size: 12px; display: inline-block; margin-left: 8px; }

        @media print {
            @page { size: A4; margin: 0; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 210mm; display: grid !important; grid-template-columns: 105mm 105mm; grid-auto-rows: 74.25mm; }
            .label-card { width: 105mm; height: 74.25mm; border: 0.1mm solid #000; box-sizing: border-box; display: flex !important; padding: 8mm; align-items: center; page-break-inside: avoid; }
            .qr-side { width: 35mm; }
            .qr-side img { width: 32mm !important; height: 32mm !important; }
            .info-side { flex: 1; margin-left: 6mm; }
            .data-box { border-top: 2px solid #000; margin-top: 4mm; padding-top: 3mm; }
            .val-text { font-family: 'JetBrains Mono'; font-size: 17pt; font-weight: 800; }
        }
        #print-area { display: none; }
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        #reader { width: 90%; max-width: 450px; background: white; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h2 style="margin:0; display:flex; align-items:center; gap:10px;">📦 BMW 고품 반납 관리</h2>
        <div class="top-btns">
            <button class="btn btn-excel" onclick="exportExcel()">📊 엑셀 저장</button>
            <button class="btn btn-print-main" onclick="printSelected()">📄 병합 인쇄(8장)</button>
        </div>
    </div>

    <div class="filter-bar">
        <strong>📅 기간 설정:</strong>
        <input type="date" id="startDate"> ~ <input type="date" id="endDate">
        <button class="btn" style="background:white; border:1px solid #cbd5e1; padding:6px 12px;" onclick="applyDateFilter()">적용</button>
        <button onclick="fetchData()" style="background:none; border:none; color:#64748b; cursor:pointer; font-size:13px; margin-left:10px;">초기화</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width:30px;"><input type="checkbox" onclick="toggleAll(this)"></th>
                <th>QR</th>
                <th>차대번호</th>
                <th>부품 정보</th>
                <th>매칭/상태</th>
                <th>기능</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<div id="scanner-modal">
    <div id="reader"></div>
    <button class="btn" style="margin-top:20px; background:white;" onclick="closeScanner()">❌ 닫기</button>
</div>

<div id="print-area"></div>

<script>
    const SURL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SKEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SURL, SKEY);
    
    let masterData = [];
    let html5QrCode;

    window.onload = fetchData;

    async function fetchData() {
        const { data } = await sb.from('qr_returns').select('*').order('created_at', { ascending: false });
        masterData = data || [];
        renderList(masterData);
    }

    function renderList(data) {
        document.getElementById('list-body').innerHTML = data.map(item => `
            <tr>
                <td><input type="checkbox" class="row-check" value="${item.id}"></td>
                <td><img style="width:50px; border-radius:4px;" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}"></td>
                <td style="font-family:'JetBrains Mono'; font-weight:700; color:var(--primary);">${item.차대번호}</td>
                <td><strong>${item.품번}</strong><br><span style="font-size:12px; color:#64748b;">${item.품명}</span></td>
                <td>
                    <div style="display:flex; align-items:center;">
                        <button class="btn btn-match" onclick="startIntegratedScan('${item.id}', '${item.차대번호}', '${item.품번}')">🔗 출고서 매칭</button>
                        ${item.bmw_qr_code ? `<span class="status-tag">✅ 수거 완료</span>` : ''}
                    </div>
                </td>
                <td>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-row-print" onclick="printSingle('${item.id}')">인쇄</button>
                        <button class="btn-del" onclick="deleteItem('${item.id}')">삭제</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function startIntegratedScan(id, originVin, originPart) {
        document.getElementById('scanner-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (decodedText) => {
            const f = decodedText.split(',');
            if (f.length < 12) return alert("올바른 공식 QR 형식이 아닙니다.");

            const scVin = f[2]; 
            const scPart = f[9]; 
            
            const isVinMatch = originVin.includes(scVin) || scVin.includes(originVin.slice(-7));
            const isPartMatch = originPart.replace(/[^a-zA-Z0-9]/g, '') === scPart.replace(/[^a-zA-Z0-9]/g, '');

            if (isVinMatch && isPartMatch) {
                if(confirm(`[판독 결과: 일치]\n수거 완료 처리하시겠습니까?`)) {
                    await sb.from('qr_returns').update({ 
                        bmw_qr_code: decodedText,
                        차대번호: scVin,
                        품번: scPart,
                        교환일: `20${f[7].substring(0,2)}-${f[7].substring(2,4)}-${f[7].substring(4,6)}`
                    }).eq('id', id);
                    closeScanner(); fetchData();
                }
            } else {
                alert(`⚠️ 정보 불일치!\n기존: ${originVin} / ${originPart}\n스캔: ${scVin} / ${scPart}`);
                closeScanner();
            }
        });
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Returns");
        XLSX.utils.writeFile(wb, `BMW_Returns_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function applyDateFilter() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        if(!start || !end) return alert("날짜를 선택하세요.");
        const filtered = masterData.filter(i => i.교환일 >= start && i.교환일 <= end);
        renderList(filtered);
    }

    function printSingle(id) {
        const item = masterData.find(i => String(i.id) === String(id));
        document.getElementById('print-area').innerHTML = makeLabelHtml(item);
        document.getElementById('print-area').style.display = 'grid';
        setTimeout(() => { window.print(); document.getElementById('print-area').style.display = 'none'; }, 300);
    }

    function printSelected() {
        const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(c => c.value);
        if(!ids.length) return alert("항목을 선택하세요.");
        const targets = masterData.filter(i => ids.includes(String(i.id)));
        document.getElementById('print-area').innerHTML = targets.map(t => makeLabelHtml(t)).join('');
        document.getElementById('print-area').style.display = 'grid';
        setTimeout(() => { window.print(); document.getElementById('print-area').style.display = 'none'; }, 500);
    }

    function makeLabelHtml(item) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}`;
        return `<div class="label-card"><div class="qr-side"><img src="${qrUrl}"></div><div class="info-side"><div style="font-size:12px; font-weight:700;">날짜: ${item.교환일} / 작업자: ${item.작업자}</div><div style="font-size:12px; font-weight:700; margin-top:2px;">품명: ${item.품명}</div><div class="data-box"><div style="font-size:9px; font-weight:bold;">PART NUMBER</div><div class="val-text">${item.품번}</div><div style="font-size:9px; font-weight:bold; margin-top:5px;">VIN (LAST 7)</div><div class="val-text">${item.차대번호.slice(-7)}</div></div></div></div>`;
    }

    function closeScanner() { if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-modal').style.display='none'); }
    function toggleAll(src) { document.querySelectorAll('.row-check').forEach(c => c.checked = src.checked); }
    async function deleteItem(id) { if(confirm("정말 삭제하시겠습니까?")) { await sb.from('qr_returns').delete().eq('id', id); fetchData(); } }
</script>
</body>
</html>
