<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고품 관리 시스템 - 관리자</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; padding: 20px; margin: 0; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 22px; margin: 0; border-left: 5px solid #3ecf8e; padding-left: 15px; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-excel { background: #1d6f42; color: white; }
        .btn-multi-print { background: #3498db; color: white; }
        .btn-multi-delete { background: #e74c3c; color: white; }
        .btn-row-print { background: #3ecf8e; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-row-delete { background: #ff4d4f; color: white; padding: 5px 10px; font-size: 12px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: #f1f3f5; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .qr-thumb { width: 45px; height: 45px; border: 1px solid #ddd; border-radius: 4px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        
        #print-section { display: none; }
        @media print {
            body * { display: none !important; }
            #print-section, #print-section * { display: block !important; }
            #print-section { width: 100%; position: absolute; top: 0; left: 0; }
            .print-card { border: 2px solid #000; width: 320px; margin: 20px auto; padding: 20px; text-align: center; page-break-after: always; background: white; }
            .print-qr-img { width: 200px; height: 200px; margin: 15px 0; }
            .info-box { text-align: left; font-size: 14px; line-height: 1.8; border-top: 1px solid #000; padding-top: 10px; }
            .info-label { font-weight: bold; width: 70px; display: inline-block; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-flex">
        <h1>📦 고품 반납 관리 리스트</h1>
        <div class="btn-group">
            <button class="btn btn-excel" onclick="downloadExcel()">📊 엑셀</button>
            <button class="btn btn-multi-print" onclick="printSelected()">🖨️ 선택 인쇄</button>
            <button class="btn btn-multi-delete" onclick="deleteSelected()">🗑️ 선택 삭제</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="check-all" onclick="toggleAll(this)"></th>
                <th>QR</th>
                <th>차대번호</th>
                <th>품번 / 품명</th>
                <th>교환일 ↓</th>
                <th>작업자</th>
                <th>기능</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="7" style="text-align:center; padding:40px;">데이터를 불러오는 중...</td></tr>
        </tbody>
    </table>
</div>

<div id="print-section"></div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let fetchedData = [];

    async function loadData() {
        // 교환일(최신순) -> 등록일(최신순) 정렬
        const { data, error } = await sb.from('qr_returns')
            .select('*')
            .order('교환일', { ascending: false })
            .order('created_at', { ascending: false });

        if (error) { alert("로드 에러: " + error.message); return; }

        fetchedData = data;
        const tbody = document.getElementById('table-body');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">데이터가 없습니다.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(item => `
            <tr id="row-${item.id}">
                <td><input type="checkbox" class="row-check" value="${item.id}"></td>
                <td><img class="qr-thumb" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}"></td>
                <td style="font-weight:bold">${item.차대번호}</td>
                <td><div>${item.품번}</div><div style="font-size:12px; color:#777">${item.품명}</div></td>
                <td style="color: #2c3e50; font-weight: 500;">${item.교환일}</td>
                <td>${item.작업자}</td>
                <td>
                    <button class="btn btn-row-print" onclick='doPrintSingle(${JSON.stringify(item)})'>인쇄</button>
                    <button class="btn btn-row-delete" onclick="deleteItem('${item.id}')">삭제</button>
                </td>
            </tr>
        `).join('');
    }

    // 체크박스 전체 선택/해제
    function toggleAll(source) {
        const checkboxes = document.querySelectorAll('.row-check');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }

    // 선택된 데이터 가져오기 전용 함수
    function getSelectedItems() {
        const selectedIds = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value);
        return fetchedData.filter(item => selectedIds.includes(item.id));
    }

    // 선택 인쇄 실행
    function printSelected() {
        const selected = getSelectedItems();
        if (selected.length === 0) return alert("인쇄할 항목을 선택해 주세요.");
        
        const area = document.getElementById('print-section');
        area.innerHTML = selected.map(item => `
            <div class="print-card">
                <h2 style="margin:0">고품 반납표</h2>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}" class="print-qr-img">
                <div class="info-box">
                    <div><span class="info-label">차대번호:</span> ${item.차대번호}</div>
                    <div><span class="info-label">품번:</span> ${item.품번}</div>
                    <div><span class="info-label">품명:</span> ${item.품명}</div>
                    <div><span class="info-label">교환일:</span> ${item.교환일}</div>
                    <div><span class="info-label">작업자:</span> ${item.작업자}</div>
                </div>
            </div>
        `).join('');

        setTimeout(() => { window.print(); }, 500);
    }

    // 선택 삭제 실행
    async function deleteSelected() {
        const selectedIds = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value);
        if (selectedIds.length === 0) return alert("삭제할 항목을 선택해 주세요.");
        if (!confirm(`선택한 ${selectedIds.length}개의 항목을 삭제하시겠습니까?`)) return;

        const { error } = await sb.from('qr_returns').delete().in('id', selectedIds);
        if (error) { alert("삭제 실패: " + error.message); }
        else { alert("삭제 완료"); loadData(); }
    }

    // 단일 인쇄/삭제 함수 (기존과 동일)
    function doPrintSingle(item) {
        const area = document.getElementById('print-section');
        area.innerHTML = `
            <div class="print-card">
                <h2>고품 반납표</h2>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}" class="print-qr-img">
                <div class="info-box">
                    <div><span class="info-label">차대번호:</span> ${item.차대번호}</div>
                    <div><span class="info-label">품번:</span> ${item.품번}</div>
                    <div><span class="info-label">품명:</span> ${item.품명}</div>
                    <div><span class="info-label">교환일:</span> ${item.교환일}</div>
                    <div><span class="info-label">작업자:</span> ${item.작업자}</div>
                </div>
            </div>
        `;
        setTimeout(() => { window.print(); }, 400);
    }

    async function deleteItem(id) {
        if (!confirm("삭제하시겠습니까?")) return;
        await sb.from('qr_returns').delete().eq('id', id);
        loadData();
    }

    function downloadExcel() {
        const excelData = fetchedData.map(item => ({
            "교환일": item.교환일, "차대번호": item.차대번호, "품번": item.품번, "품명": item.품명, "작업자": item.작업자
        }));
        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "고품리스트");
        XLSX.writeFile(wb, `고품반납_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    loadData();
</script>
</body>
</html>
