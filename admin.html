<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고품 관리 시스템 - 관리자</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; padding: 20px; margin: 0; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; margin-bottom: 20px; border-left: 5px solid #3ecf8e; padding-left: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: #f1f3f5; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .qr-thumb { width: 45px; height: 45px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-print { padding: 8px 14px; background: #3ecf8e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* 인쇄 전용 설정 */
        #print-section { display: none; }
        @media print {
            body * { display: none !important; }
            #print-section, #print-section * { display: block !important; }
            #print-section { width: 100%; position: absolute; top: 0; left: 0; }
            .print-card { border: 2px solid #000; width: 320px; margin: 20px auto; padding: 20px; text-align: center; }
            .print-qr-img { width: 200px; height: 200px; margin: 15px 0; }
            .info-box { text-align: left; font-size: 14px; line-height: 1.8; border-top: 1px solid #000; padding-top: 10px; }
            .info-label { font-weight: bold; width: 70px; display: inline-block; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>📦 고품 반납 관리 리스트</h1>
    <table>
        <thead>
            <tr>
                <th>QR</th>
                <th>차대번호</th>
                <th>품번 / 품명</th>
                <th>작업자</th>
                <th>기능</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="5" id="loader" style="text-align:center; padding:40px;">데이터를 불러오는 중...</td></tr>
        </tbody>
    </table>
</div>

<div id="print-section"></div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
        const { data, error } = await sb.from('qr_returns').select('*').order('created_at', { ascending: false });

        if (error) {
            document.getElementById('loader').innerHTML = `<span style="color:red">에러 발생: ${error.message}</span>`;
            return;
        }

        const tbody = document.getElementById('table-body');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">데이터가 없습니다.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(item => `
            <tr>
                <td><img class="qr-thumb" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}"></td>
                <td style="font-weight:bold">${item.차대번호}</td>
                <td><div>${item.품번}</div><div style="font-size:12px; color:#777">${item.품명}</div></td>
                <td>${item.작업자}</td>
                <td><button class="btn-print" onclick='doPrint(${JSON.stringify(item)})'>개별 인쇄</button></td>
            </tr>
        `).join('');
    }

    function doPrint(item) {
        const area = document.getElementById('print-section');
        const qr = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}`;
        
        area.innerHTML = `
            <div class="print-card">
                <h2 style="margin:0">고품 반납표</h2>
                <img src="${qr}" class="print-qr-img" id="p-img">
                <div class="info-box">
                    <div><span class="info-label">차대번호:</span> ${item.차대번호}</div>
                    <div><span class="info-label">품번:</span> ${item.품번}</div>
                    <div><span class="info-label">품명:</span> ${item.품명}</div>
                    <div><span class="info-label">작업자:</span> ${item.작업자}</div>
                    <div><span class="info-label">교환일:</span> ${item.교환일}</div>
                </div>
            </div>
        `;

        const img = document.getElementById('p-img');
        img.onload = () => { setTimeout(() => { window.print(); }, 400); };
        img.onerror = () => { window.print(); };
    }

    loadData();
</script>
</body>
</html>
