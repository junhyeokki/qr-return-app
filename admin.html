<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMW Warranty Admin - Full Restore</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1c69d4; --bg: #f4f7f9; --accent-red: #e74c3c; --success: #27ae60; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* 헤더 및 필터 영역 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        .filter-section { display: flex; align-items: center; gap: 10px; background: #ebf0f5; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; }
        .filter-section input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        
        .top-btns { display: flex; gap: 8px; }
        
        /* 버튼 스타일 */
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-scan { background: #000; color: white; }
        .btn-excel { background: #157347; color: white; }
        .btn-print { background: var(--primary); color: white; }
        .btn-row-print { background: #334155; color: white; padding: 4px 8px; font-size: 11px; } /* 개별 인쇄 버튼 */
        .btn-match { background: var(--success); color: white; padding: 5px 10px; font-size: 11px; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .qr-thumb { width: 45px; height: 45px; border: 1px solid #eee; border-radius: 4px; }

        /* 스캐너 모달 */
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        #reader { width: 100%; max-width: 450px; background: white; border-radius: 12px; overflow: hidden; }

        /* 인쇄 레이아웃 (A4 8구) */
        @media print {
            @page { size: A4; margin: 10mm; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; display: grid !important; grid-template-columns: 1fr 1fr; gap: 5mm; }
            .label-card { display: flex !important; border: 2.5px solid #000; height: 65mm; padding: 5mm; box-sizing: border-box; align-items: center; background: white; page-break-inside: avoid; }
            .qr-side { width: 35%; border-right: 2px solid #000; padding-right: 5mm; }
            .info-side { flex-grow: 1; padding-left: 5mm; }
            .data-box { margin-top: 10px; padding-top: 10px; border-top: 2.5px solid #000; }
            .val-text { font-family: 'JetBrains Mono'; font-size: 19px; font-weight: 800; color: #000; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h2 style="margin:0;">📦 BMW 고품 반납 관리</h2>
        <div class="top-btns">
            <button class="btn btn-scan" onclick="openScanner('CHECK')">📱 QR 스캔 검수</button>
            <button class="btn btn-excel" onclick="exportExcel()">📊 엑셀</button>
            <button class="btn btn-print" onclick="printSelected()">📄 병합 인쇄(8장)</button>
        </div>
    </div>

    <div class="filter-section">
        <strong>📅 기간 설정:</strong>
        <input type="date" id="startDate"> ~ <input type="date" id="endDate">
        <button class="btn" style="background:#fff; border:1px solid #ccc; padding:5px 10px;" onclick="applyDateFilter()">적용</button>
        <button class="btn" style="background:transparent; font-size:11px;" onclick="fetchData()">초기화</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width:30px;"><input type="checkbox" onclick="toggleAll(this)"></th>
                <th>QR</th>
                <th>차대번호</th>
                <th>부품 정보</th>
                <th>매칭/상태</th>
                <th>기능</th> </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<div id="scanner-modal">
    <div id="reader"></div>
    <button class="btn" style="margin-top:20px; background:white;" onclick="closeScanner()">❌ 닫기</button>
</div>

<div id="print-area"></div>

<script>
    const SURL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SKEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SURL, SKEY);
    
    let masterData = [];
    let html5QrCode;

    window.onload = fetchData;

    async function fetchData() {
        const { data } = await sb.from('qr_returns').select('*').order('created_at', { ascending: false });
        masterData = data || [];
        renderList(masterData);
    }

    // 기간 필터 적용 함수
    function applyDateFilter() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        if(!start || !end) return alert("시작일과 종료일을 모두 선택해주세요.");
        
        const filtered = masterData.filter(item => {
            const itemDate = item.교환일; // DB의 교환일 기준
            return itemDate >= start && itemDate <= end;
        });
        renderList(filtered);
    }

    function renderList(data) {
        document.getElementById('list-body').innerHTML = data.map(item => `
            <tr>
                <td><input type="checkbox" class="row-check" value="${item.id}"></td>
                <td><img class="qr-thumb" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}"></td>
                <td style="font-family:'JetBrains Mono'; font-weight:700; color:#1c69d4;">${item.차대번호}</td>
                <td><strong>${item.품번}</strong><br><small>${item.품명}</small></td>
                <td>
                    ${item.bmw_qr_code ? `<span style="color:green; font-weight:bold;">✅ 매칭됨</span>` : 
                    `<button class="btn btn-match" onclick="openScanner('MATCH', '${item.id}')">🔗 출고서 매칭</button>`}
                </td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-row-print" onclick="printSingle('${item.id}')">인쇄</button> <button onclick="deleteItem('${item.id}')" style="background:#fee; color:#e74c3c; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">삭제</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // 개별 인쇄 함수
    function printSingle(id) {
        const item = masterData.find(i => String(i.id) === String(id));
        if(!item) return;
        document.getElementById('print-area').innerHTML = makeLabelHtml(item);
        setTimeout(() => { window.print(); }, 300);
    }

    // (스캐너 및 인쇄 양식 로직은 이전과 동일하게 유지)
    function makeLabelHtml(item) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}`;
        return `
            <div class="label-card">
                <div class="qr-side"><img src="${qrUrl}"></div>
                <div class="info-side">
                    <div style="font-size:12px; font-weight:700;">교환일: ${item.교환일} / 작업자: ${item.작업자}</div>
                    <div style="font-size:12px; font-weight:700; margin: 3px 0;">품명: ${item.품명}</div>
                    <div class="data-box">
                        <div style="font-size:9px; font-weight:bold;">PART NUMBER</div>
                        <div class="val-text">${item.품번}</div>
                        <div style="font-size:9px; font-weight:bold; margin-top:5px;">VIN (LAST 7)</div>
                        <div class="val-text">${item.차대번호.slice(-7)}</div>
                    </div>
                </div>
            </div>`;
    }

    function openScanner(mode, id = null) {
        document.getElementById('scanner-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, async (decodedText) => {
            if(mode === 'MATCH') {
                const { error } = await sb.from('qr_returns').update({ bmw_qr_code: decodedText }).eq('id', id);
                if(!error) { alert("매칭 완료!"); closeScanner(); fetchData(); }
            } else {
                window.open(decodedText, '_blank');
                closeScanner();
            }
        });
    }

    function closeScanner() {
        if(html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scanner-modal').style.display = 'none'; });
    }

    function printSelected() {
        const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(c => c.value);
        if(!ids.length) return alert("항목을 선택하세요.");
        const targets = masterData.filter(i => ids.includes(String(i.id)));
        document.getElementById('print-area').innerHTML = targets.map(t => makeLabelHtml(t)).join('');
        setTimeout(() => { window.print(); }, 500);
    }

    async function deleteItem(id) { if(confirm("삭제할까요?")) { await sb.from('qr_returns').delete().eq('id', id); fetchData(); } }
    function toggleAll(src) { document.querySelectorAll('.row-check').forEach(c => c.checked = src.checked); }
    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Returns");
        XLSX.utils.writeFile(wb, `BMW_Returns.xlsx`);
    }
</script>
</body>
</html>
