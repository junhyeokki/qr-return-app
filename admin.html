<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고품 관리자 모드</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; padding: 30px; margin: 0; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #f1f3f5; color: #495057; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .qr-thumb { width: 50px; height: 50px; border: 1px solid #eee; border-radius: 4px; }
        .btn-row-print { padding: 8px 15px; background: #3ecf8e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        #print-section { display: none; }
        @media print {
            body * { display: none !important; }
            #print-section, #print-section * { display: block !important; }
            #print-section { position: absolute; left: 0; top: 0; width: 100%; }
            .print-ticket { width: 350px; margin: 20px auto; border: 2px solid #000; padding: 25px; box-sizing: border-box; text-align: center; background: white; }
            .print-qr-img { width: 220px; height: 220px; margin: 15px 0; }
            .print-info { text-align: left; font-size: 15px; line-height: 1.8; border-top: 1.5px solid #000; padding-top: 15px; }
            .print-label { font-weight: bold; width: 85px; display: inline-block; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>📦 고품 반납 관리 리스트</h1>
    <table>
        <thead>
            <tr>
                <th>QR</th>
                <th>차대번호</th>
                <th>품번 / 품명</th>
                <th>교환일</th>
                <th>작업자</th>
                <th>기능</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            <tr><td colspan="6" id="status-msg" style="text-align:center; padding:50px;">데이터를 불러오는 중...</td></tr>
        </tbody>
    </table>
</div>

<div id="print-section"></div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchAdminData() {
        const tableBody = document.getElementById('admin-table-body');
        const statusMsg = document.getElementById('status-msg');

        try {
            // 데이터 호출
            const { data, error } = await sb
                .from('qr_returns')
                .select('*')
                .order('created_at', { ascending: false });

            // 에러 발생 시
            if (error) {
                console.error('Supabase Error:', error);
                statusMsg.innerHTML = `<span style="color:red;">❌ 에러 발생: ${error.message}</span>`;
                return;
            }

            // 데이터가 비었을 때
            if (!data || data.length === 0) {
                statusMsg.innerHTML = "내역이 없습니다.";
                return;
            }

            // 테이블 렌더링
            tableBody.innerHTML = data.map(item => `
                <tr>
                    <td>
                        <img class="qr-thumb" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}">
                    </td>
                    <td style="font-family: monospace; font-weight: bold; font-size: 15px;">${item.차대번호 || '-'}</td>
                    <td>
                        <div style="font-weight: 600;">${item.품번}</div>
                        <div style="font-size: 12px; color: #7f8c8d;">${item.품명}</div>
                    </td>
                    <td>${item.교환일}</td>
                    <td>${item.작업자}</td>
                    <td>
                        <button class="btn-row-print" onclick='preparePrint(${JSON.stringify(item)})'>개별 인쇄</button>
                    </td>
                </tr>
            `).join('');

        } catch (err) {
            console.error('Unknown Error:', err);
            statusMsg.innerHTML = `<span style="color:red;">❌ 시스템 오류: ${err.message}</span>`;
        }
    }

    function preparePrint(item) {
        const printSection = document.getElementById('print-section');
        const qrUrl = `
