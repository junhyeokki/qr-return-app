<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고품 관리자 모드</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; padding: 30px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #f1f3f5; color: #495057; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .qr-thumb { width: 50px; height: 50px; border: 1px solid #eee; border-radius: 4px; }
        .btn-row-print { padding: 6px 12px; background: #3ecf8e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-row-print:hover { background: #34b37b; }

        /* 인쇄 전용 스타일 (화면에는 안 보임) */
        #print-section { display: none; }
        @media print {
            body * { display: none !important; }
            #print-section { display: block !important; width: 100%; padding: 0; margin: 0; }
            .print-ticket { 
                border: 2px solid #000; padding: 20px; width: 300px; text-align: center; margin: 0 auto;
                page-break-inside: avoid;
            }
            .print-qr { width: 200px; height: 200px; margin-bottom: 10px; }
            .print-info { text-align: left; font-size: 14px; line-height: 1.6; border-top: 1px solid #000; padding-top: 10px; }
            .print-label { font-weight: bold; width: 80px; display: inline-block; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>📦 고품 반납 관리 리스트</h1>

    <table>
        <thead>
            <tr>
                <th>QR</th>
                <th>차대번호</th>
                <th>품번 / 품명</th>
                <th>교환일</th>
                <th>작업자</th>
                <th>기능</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            </tbody>
    </table>
</div>

<div id="print-section"></div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchAdminData() {
        const { data, error } = await sb
            .from('qr_returns')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { alert('로드 실패: ' + error.message); return; }

        const tableBody = document.getElementById('admin-table-body');
        tableBody.innerHTML = data.map(item => `
            <tr>
                <td>
                    <img class="qr-thumb" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}">
                </td>
                <td style="font-family: monospace; font-weight: bold;">${item.차대번호 || '-'}</td>
                <td>
                    <div style="font-weight: 600;">${item.품번}</div>
                    <div style="font-size: 12px; color: #666;">${item.품명}</div>
                </td>
                <td>${item.교환일}</td>
                <td>${item.작업자}</td>
                <td>
                    <button class="btn-row-print" onclick='printSingleItem(${JSON.stringify(item)})'>개별 인쇄</button>
                </td>
            </tr>
        `).join('');
    }

    // 개별 인쇄 함수
    function printSingleItem(item) {
        const printSection = document.getElementById('print-section');
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}`;
        
        printSection.innerHTML = `
            <div class="print-ticket">
                <h2 style="margin-top:0;">고품 반납표</h2>
                <img src="${qrUrl}" class="print-qr">
                <div class="print-info">
                    <div><span class="print-label">차대번호:</span> ${item.차대번호}</div>
                    <div><span class="print-label">품번:</span> ${item.품번}</div>
                    <div><span class="print-label">품명:</span> ${item.품명}</div>
                    <div><span class="print-label">교환일:</span> ${item.교환일}</div>
                    <div><span class="print-label">작업자:</span> ${item.작업자}</div>
                    <div><span class="print-label">수리항목:</span> ${item.수리항목 || '-'}</div>
                </div>
                <p style="font-size:10px; margin-top:15px; border-top:1px dashed #ccc;">* 본 고품은 BMW 규정에 따라 관리됩니다.</p>
            </div>
        `;
        
        window.print();
    }

    fetchAdminData();
</script>
</body>
</html>
