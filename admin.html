<style>
    @media print {
        @page { size: A4; margin: 10mm; }
        body * { display: none !important; }
        #print-area { 
            display: grid !important; 
            grid-template-columns: 1fr 1fr; /* 2열 배치 */
            gap: 4mm; 
            width: 100%;
        }
        /* 개별 라벨 카드 */
        .label-card {
            display: flex !important;
            border: 1.5px solid #000;
            height: 65mm;
            padding: 5mm;
            box-sizing: border-box;
            background: white;
            align-items: center;
        }
        .qr-side { width: 35%; padding-right: 4mm; border-right: 1px solid #ddd; }
        .qr-side img { width: 100%; height: auto; display: block; }
        
        .info-side { 
            width: 65%; 
            padding-left: 4mm; 
            display: flex !important; 
            flex-direction: column !important; 
            justify-content: center;
        }
        .line { font-size: 12px; font-weight: 700; margin-bottom: 3px; color: #000; }
        .data-box { 
            margin-top: 8px; 
            padding-top: 8px; 
            border-top: 2px solid #000; 
            display: flex !important; 
            flex-direction: column !important; 
        }
        .val-group { margin-bottom: 5px; }
        .val-label { font-size: 10px; color: #555; display: block; font-weight: bold; }
        .val-text { font-family: 'JetBrains Mono'; font-size: 17px; font-weight: 800; color: #000; }
    }
</style>

<script>
    // 이 함수가 데이터를 받아 실제 HTML로 변환하는 핵심입니다.
    function makeLabelHtml(item) {
        // 데이터 누락 방지를 위한 검증
        const vin = item.차대번호 || 'N/A';
        const partNo = item.품번 || 'N/A';
        const partName = item.품명 || '정보 없음';
        const worker = item.작업자 || '미지정';
        const date = item.교환일 || '-';
        
        // QR 생성 (데이터 유무 확인)
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${item.id}`;

        return `
            <div class="label-card">
                <div class="qr-side">
                    <img src="${qrUrl}" alt="QR">
                </div>
                <div class="info-side">
                    <div class="line">교환일: ${date}</div>
                    <div class="line">작업자: ${worker}</div>
                    <div class="line">품명: ${partName}</div>
                    <div class="data-box">
                        <div class="val-group">
                            <span class="val-label">PART NUMBER</span>
                            <span class="val-text">${partNo}</span>
                        </div>
                        <div class="val-group">
                            <span class="val-label">VIN (LAST 7)</span>
                            <span class="val-text">${vin.slice(-7)}</span>
                        </div>
                    </div>
                </div>
            </div>`;
    }
</script>
