<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반납 정보 확인</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; min-height: 100vh; align-items: flex-start; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 20px; }
        .header { background: #3ecf8e; color: white; padding: 24px; text-align: center; }
        .header h2 { margin: 0; font-size: 20px; letter-spacing: -0.5px; }
        .content { padding: 24px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        .label { color: #8e8e93; font-size: 14px; font-weight: 500; }
        .value { font-weight: 600; color: #1c1c1e; text-align: right; font-size: 15px; }
        .loading { text-align: center; padding: 60px; color: #8e8e93; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <div class="header">
            <h2>고품 반납 정보</h2>
        </div>
        <div class="content" id="info-content">
            <div class="loading">데이터를 불러오는 중...</div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            document.getElementById('info-content').innerHTML = "<div style='text-align:center; padding:40px; color:#ff3b30;'>잘못된 접근입니다.</div>";
            return;
        }

        const { data, error } = await sb.from('qr_returns').select('*').eq('id', id).single();

        if (error || !data) {
            document.getElementById('info-content').innerHTML = "<div style='text-align:center; padding:40px; color:#ff3b30;'>정보를 찾을 수 없습니다.</div>";
            return;
        }

        // 출력할 필드 리스트 (순서 조정 가능)
        const fields = ['차대번호', '품번', '품명', '교환일', '수량', '작업자', '수리항목'];
        let html = '';
        fields.forEach(field => {
            html += `
                <div class="info-row">
                    <span class="label">${field}</span>
                    <span class="value">${data[field] || '-'}</span>
                </div>
            `;
        });
        document.getElementById('info-content').innerHTML = html;
    }

    loadData();
</script>
</body>
</html>
