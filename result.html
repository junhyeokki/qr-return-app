<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반납 정보 확인</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #3ecf8e; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .label { color: #888; font-size: 14px; }
        .value { font-weight: 600; color: #333; }
        .loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <div class="header">
            <h2 style="margin:0; font-size:18px;">고품 반납 정보</h2>
        </div>
        <div class="content" id="info-content">
            <div class="loading">데이터를 불러오는 중...</div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
        // 주소창에서 id 추출 (?id=123 형식)
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            document.getElementById('info-content').innerHTML = "잘못된 접근입니다.";
            return;
        }

        const { data, error } = await sb.from('qr_returns').select('*').eq('id', id).single();

        if (error || !data) {
            document.getElementById('info-content').innerHTML = "정보를 찾을 수 없습니다.";
            return;
        }

        // 화면에 데이터 뿌리기
        const fields = ['품번', '품명', '교환일', '수량', '작업자', '수리항목'];
        let html = '';
        fields.forEach(field => {
            html += `
                <div class="info-row">
                    <span class="label">${field}</span>
                    <span class="value">${data[field] || '-'}</span>
                </div>
            `;
        });
        document.getElementById('info-content').innerHTML = html;
    }

    loadData();
</script>
</body>
</html>
