<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고품 반납 시스템</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #111318;
  --surf:   #191c24;
  --surf2:  #1f2330;
  --border: rgba(255,255,255,0.06);
  --text:   #f0f1f5;
  --dim:    rgba(240,241,245,0.38);
  --dim2:   rgba(240,241,245,0.6);

  /* 포인트 컬러 — 앰버/오렌지 계열 웜톤 */
  --p:      #f5a623;
  --p-dim:  rgba(245,166,35,0.12);
  --p-glow: rgba(245,166,35,0.25);

  --ok:     #34c48a;
  --ok-dim: rgba(52,196,138,0.12);
  --fail:   #f06060;
  --fail-dim:rgba(240,96,96,0.12);
  --scan:   #7b8cde;
  --scan-dim:rgba(123,140,222,0.12);

  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --r: 12px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); display: flex; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   사이드바
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sidebar {
  width: 200px;
  background: var(--surf);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  flex-shrink: 0;
  z-index: 10;
}
.sb-head {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
}
.sb-brand {
  font-size: 16px;
  font-weight: 900;
  color: var(--p);
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.sb-brand span {
  display: block;
  font-size: 10px;
  font-weight: 400;
  color: var(--dim);
  margin-top: 3px;
  letter-spacing: 0.5px;
}
.sb-section {
  padding: 18px 20px 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--dim);
  letter-spacing: 1.2px;
  text-transform: uppercase;
}
.nav {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  margin: 2px 8px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--dim2);
  transition: all 0.15s;
  border: none;
  background: transparent;
  font-family: var(--sans);
  width: calc(100% - 16px);
  text-align: left;
}
.nav .ico { font-size: 16px; flex-shrink: 0; }
.nav:hover { background: var(--border); color: var(--text); }
.nav.on {
  background: var(--p-dim);
  color: var(--p);
  font-weight: 700;
  border: 1px solid rgba(245,166,35,0.2);
}
.sb-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--dim);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   메인
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar {
  height: 56px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 12px;
  flex-shrink: 0;
}
.tb-title { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
.tb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--p); opacity: 0.6; flex-shrink: 0; }
.tb-sub { font-size: 12px; color: var(--dim); }
.tb-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* 버튼 */
.btn {
  padding: 7px 15px; border-radius: 8px; border: none;
  font-size: 12px; font-weight: 700; font-family: var(--sans);
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s; letter-spacing: -0.2px;
}
.btn-p { background: var(--p); color: #111; }
.btn-p:hover { background: #ffb83d; box-shadow: 0 4px 16px var(--p-glow); }
.btn-g { background: var(--surf2); color: var(--dim2); border: 1px solid var(--border); }
.btn-g:hover { color: var(--text); border-color: rgba(255,255,255,0.12); }
.btn-excel { background: rgba(52,196,138,0.15); color: var(--ok); border: 1px solid rgba(52,196,138,0.2); }
.btn-excel:hover { background: rgba(52,196,138,0.25); }

.scroll { flex: 1; overflow-y: auto; padding: 24px 28px; }
.scroll::-webkit-scrollbar { width: 3px; }
.scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.page { display: none; }
.page.on { display: block; animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   통계 카드
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 22px; }
@media(max-width:700px){ .stats{grid-template-columns:repeat(2,1fr);} }

.sc {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s;
  cursor: default;
}
.sc:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.1); }
.sc-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--r) var(--r) 0 0; }
.sc:nth-child(1) .sc-accent { background: linear-gradient(90deg, var(--p), #ffcc70); }
.sc:nth-child(2) .sc-accent { background: linear-gradient(90deg, var(--ok), #7eecc0); }
.sc:nth-child(3) .sc-accent { background: linear-gradient(90deg, var(--fail), #ff9898); }
.sc:nth-child(4) .sc-accent { background: linear-gradient(90deg, var(--scan), #a5b0f0); }

.sc-label { font-size: 11px; font-weight: 600; color: var(--dim); margin-bottom: 10px; letter-spacing: 0.3px; }
.sc-val { font-size: 40px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.sc:nth-child(1) .sc-val { color: var(--p); }
.sc:nth-child(2) .sc-val { color: var(--ok); }
.sc:nth-child(3) .sc-val { color: var(--fail); }
.sc:nth-child(4) .sc-val { color: var(--scan); }
.sc-bg { position: absolute; right: 14px; bottom: 10px; font-size: 34px; opacity: 0.06; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   필터
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.frow {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; flex-wrap: wrap;
}
.flbl { font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: 0.5px; }
.finput {
  background: var(--surf); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 11px; font-size: 12px; font-family: var(--mono); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.finput:focus { border-color: var(--p); box-shadow: 0 0 0 2px var(--p-glow); }
.fsep { color: var(--dim); font-size: 12px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   탭
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tabs {
  display: flex; gap: 4px; margin-bottom: 14px;
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px; width: fit-content;
}
.tab {
  padding: 6px 18px; border-radius: 7px; border: none; background: transparent;
  color: var(--dim2); font-size: 12px; font-weight: 700; font-family: var(--sans);
  cursor: pointer; transition: all 0.15s; letter-spacing: -0.2px;
}
.tab:hover { color: var(--text); }
.tab.ta  { background: var(--p);    color: #111; }
.tab.tg  { background: var(--ok);   color: #111; }
.tab.tr  { background: var(--fail); color: #fff; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   테이블
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tw { background: var(--surf); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
th {
  padding: 11px 15px; text-align: left;
  font-size: 10px; font-weight: 700; color: var(--dim);
  letter-spacing: 0.8px; white-space: nowrap; text-transform: uppercase;
}
td { padding: 14px 15px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.1s; }
tbody tr:hover { background: rgba(255,255,255,0.02); }

.id-val { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--p); }
.pn-val { font-size: 11px; color: var(--dim); margin-top: 2px; font-family: var(--mono); }
.vin-val { font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--text); }
.date-ok { font-family: var(--mono); font-size: 12px; color: var(--ok); }
.memo { font-size: 11px; color: var(--dim); }

/* 상태 태그 */
.tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.tok  { background: var(--ok-dim);   color: var(--ok);   border: 1px solid rgba(52,196,138,0.2); }
.tfail{ background: var(--fail-dim); color: var(--fail); border: 1px solid rgba(240,96,96,0.2); }
.tdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* 매칭 */
.mc { display: flex; align-items: center; gap: 8px; }
.bmatch {
  background: var(--p-dim); color: var(--p);
  border: 1px solid rgba(245,166,35,0.25);
  padding: 5px 13px; border-radius: 20px;
  font-size: 11px; font-weight: 700; font-family: var(--sans);
  cursor: pointer; transition: all 0.15s;
}
.bmatch:hover { background: var(--p-glow); }

.badge-anim {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  background: var(--ok-dim); color: var(--ok); border: 1px solid rgba(52,196,138,0.2);
  opacity: 0; transform: scale(0.7) translateX(-6px);
  animation: bIn 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards,
             glow 1.4s ease-out 0.38s 2;
}
@keyframes bIn { to{opacity:1;transform:scale(1) translateX(0);} }
@keyframes glow { 0%{box-shadow:0 0 0 0 rgba(52,196,138,0.4);} 70%{box-shadow:0 0 0 8px rgba(52,196,138,0);} 100%{box-shadow:0 0 0 0 rgba(52,196,138,0);} }
.row-ok { animation: rflash 0.7s ease forwards; }
@keyframes rflash { 0%{background:rgba(52,196,138,0.07);} 100%{background:transparent;} }

/* 소형 버튼 */
.mbtn {
  padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 600;
  font-family: var(--sans); cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--dim2);
  transition: all 0.15s;
}
.mbtn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.mbtn.del:hover { color: var(--fail); border-color: rgba(240,96,96,0.3); background: var(--fail-dim); }

/* 로딩/빈값 */
.loading { text-align: center; padding: 55px; color: var(--dim); font-size: 12px; }
.spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--p); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 12px; }
@keyframes spin{to{transform:rotate(360deg)}}
.empty { text-align: center; padding: 55px; color: var(--dim); font-size: 13px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   스캐너 모달
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#scanner-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(10,11,16,0.95);
  z-index: 2000; justify-content: center; align-items: center;
  flex-direction: column; gap: 20px; backdrop-filter: blur(12px);
}
.scan-title { font-size: 22px; font-weight: 900; color: var(--p); letter-spacing: -0.5px; }
#reader { width: 90%; max-width: 400px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━
   인쇄
━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media print {
  @page{size:A4;margin:0;}
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{position:absolute;left:0;top:0;width:210mm;display:grid!important;grid-template-columns:105mm 105mm;grid-auto-rows:74.25mm;}
  .label-card{width:105mm;height:74.25mm;border:0.1mm solid #000;box-sizing:border-box;display:flex!important;padding:8mm;align-items:center;page-break-inside:avoid;}
  .qr-side{width:35mm;} .qr-side img{width:32mm!important;height:32mm!important;}
  .info-side{flex:1;margin-left:6mm;}
  .data-box{border-top:2px solid #000;margin-top:4mm;padding-top:3mm;}
  .val-text{font-family:'JetBrains Mono';font-size:17pt;font-weight:800;}
}
#print-area{display:none;}
</style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sb-head">
    <div class="sb-brand">고품 반납<span>BMW 부품 관리 시스템</span></div>
  </div>
  <div class="sb-section">메뉴</div>
  <button class="nav on" id="nb-dash" onclick="goPage('dash')">
    <span class="ico">📊</span> 반납 현황
  </button>
  <button class="nav" id="nb-admin" onclick="goPage('admin')">
    <span class="ico">⚙️</span> QR 관리
  </button>
  <div class="sb-footer">전주점 · junhyeokki</div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="topbar">
    <div class="tb-title" id="tb-t">반납 현황</div>
    <div class="tb-dot"></div>
    <div class="tb-sub" id="tb-s">고품 수거 현황 대시보드</div>
    <div class="tb-right" id="tb-r"></div>
  </div>

  <div class="scroll">

    <!-- 현황 페이지 -->
    <div class="page on" id="page-dash">
      <div class="frow">
        <span class="flbl">기간</span>
        <input class="finput" type="date" id="ds">
        <span class="fsep">~</span>
        <input class="finput" type="date" id="de">
        <button class="btn btn-p" onclick="loadDash()">조회</button>
        <button class="btn btn-g" onclick="resetDash()">초기화</button>
      </div>

      <div class="stats">
        <div class="sc">
          <div class="sc-accent"></div>
          <div class="sc-label">청구 클레임</div>
          <div class="sc-val" id="sv-t">—</div>
          <div class="sc-bg">📦</div>
        </div>
        <div class="sc">
          <div class="sc-accent"></div>
          <div class="sc-label">수거 완료</div>
          <div class="sc-val" id="sv-ok">—</div>
          <div class="sc-bg">✅</div>
        </div>
        <div class="sc">
          <div class="sc-accent"></div>
          <div class="sc-label">미수거</div>
          <div class="sc-val" id="sv-f">—</div>
          <div class="sc-bg">⏳</div>
        </div>
        <div class="sc">
          <div class="sc-accent"></div>
          <div class="sc-label">스캔 총계</div>
          <div class="sc-val" id="sv-s">—</div>
          <div class="sc-bg">🔍</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab ta" id="dt-all"  onclick="setDF('all')">전체</button>
        <button class="tab"    id="dt-ok"   onclick="setDF('ok')">수거 완료</button>
        <button class="tab"    id="dt-fail" onclick="setDF('fail')">미수거</button>
      </div>

      <div class="tw">
        <div class="loading" id="dl"><div class="spinner"></div>불러오는 중...</div>
        <table id="dt" style="display:none;">
          <thead><tr>
            <th>번호 / 품번</th>
            <th>차대번호(뒤7)</th>
            <th>품명</th>
            <th>작업자</th>
            <th>교환일</th>
            <th>수거 상태</th>
            <th>수거일자</th>
            <th>비고</th>
          </tr></thead>
          <tbody id="db"></tbody>
        </table>
        <div class="empty" id="de2" style="display:none;">조회된 데이터가 없습니다.</div>
      </div>
    </div>

    <!-- 관리 페이지 -->
    <div class="page" id="page-admin">
      <div class="frow">
        <span class="flbl">기간</span>
        <input class="finput" type="date" id="as">
        <span class="fsep">~</span>
        <input class="finput" type="date" id="ae">
        <button class="btn btn-p" onclick="filterAdmin()">적용</button>
        <button class="btn btn-g" onclick="fetchAdmin()">전체보기</button>
      </div>

      <div class="tw">
        <div class="loading" id="al"><div class="spinner"></div>불러오는 중...</div>
        <table id="at" style="display:none;">
          <thead><tr>
            <th style="width:28px;"><input type="checkbox" onclick="toggleAll(this)" style="accent-color:var(--p);"></th>
            <th>QR</th>
            <th>차대번호</th>
            <th>부품 정보</th>
            <th>매칭 / 상태</th>
            <th>액션</th>
          </tr></thead>
          <tbody id="ab"></tbody>
        </table>
        <div class="empty" id="ae2" style="display:none;">데이터가 없습니다.</div>
      </div>
    </div>

  </div>
</div>

<!-- 스캐너 모달 -->
<div id="scanner-modal">
  <div class="scan-title">🔍 출고서 QR 스캔</div>
  <div id="reader"></div>
  <button class="btn btn-g" onclick="closeScanner()">✕ 닫기</button>
</div>
<div id="print-area"></div>

<script>
const SURL='https://dgmmcypqrqciuoqvmymj.supabase.co';
const SKEY='sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
const sb=window.supabase.createClient(SURL,SKEY);
let DD=[],AD=[],DF='all',QR;
const today=new Date().toISOString().slice(0,10);
const w7=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
document.getElementById('ds').value=w7;
document.getElementById('de').value=today;
window.onload=loadDash;

/* ── 페이지 전환 ── */
function goPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+n).classList.add('on');
  document.getElementById('nb-'+n).classList.add('on');
  if(n==='dash'){
    document.getElementById('tb-t').textContent='반납 현황';
    document.getElementById('tb-s').textContent='고품 수거 현황 대시보드';
    document.getElementById('tb-r').innerHTML='';
    if(!DD.length) loadDash();
  } else {
    document.getElementById('tb-t').textContent='QR 관리';
    document.getElementById('tb-s').textContent='출고서 매칭 및 관리';
    document.getElementById('tb-r').innerHTML=`
      <button class="btn btn-excel" onclick="exportExcel()">📊 엑셀 저장</button>
      <button class="btn btn-p" onclick="printSelected()">🖨 병합 인쇄</button>`;
    if(!AD.length) fetchAdmin();
  }
}

/* ── 현황 ── */
async function loadDash(){
  sL('d');
  const s=document.getElementById('ds').value, e=document.getElementById('de').value;
  let q=sb.from('qr_returns').select('*').order('created_at',{ascending:false});
  if(s) q=q.gte('교환일',s); if(e) q=q.lte('교환일',e);
  const{data}=await q; DD=data||[];
  const t=DD.length, ok=DD.filter(d=>d.bmw_qr_code).length;
  document.getElementById('sv-t').textContent=t;
  document.getElementById('sv-ok').textContent=ok;
  document.getElementById('sv-f').textContent=t-ok;
  document.getElementById('sv-s').textContent=ok;
  renderDash(DF);
}
function resetDash(){ document.getElementById('ds').value=w7; document.getElementById('de').value=today; loadDash(); }

function setDF(f){
  DF=f;
  ['all','ok','fail'].forEach(k=>document.getElementById('dt-'+k).className='tab');
  document.getElementById('dt-'+f).classList.add(f==='all'?'ta':f==='ok'?'tg':'tr');
  renderDash(f);
}
function renderDash(f){
  let rows=DD;
  if(f==='ok')   rows=DD.filter(d=>d.bmw_qr_code);
  if(f==='fail') rows=DD.filter(d=>!d.bmw_qr_code);
  hL('d');
  if(!rows.length){ document.getElementById('de2').style.display='block'; return; }
  document.getElementById('dt').style.display='table';
  document.getElementById('db').innerHTML=rows.map(r=>{
    const ok=!!r.bmw_qr_code; let cd='';
    if(ok){
      const f=r.bmw_qr_code.split(',');
      if(f[7]?.length===6) cd=`20${f[7].substring(0,2)}-${f[7].substring(2,4)}-${f[7].substring(4,6)}`;
      if(!cd&&r.created_at) cd=r.created_at.slice(0,10);
    }
    return `<tr>
      <td><div class="id-val">${r.id.slice(0,8).toUpperCase()}</div><div class="pn-val">${r.품번}</div></td>
      <td><span class="vin-val">${r.차대번호.slice(-7)}</span></td>
      <td>${r.품명}</td>
      <td style="font-size:12px;color:var(--dim2);">${r.작업자}</td>
      <td style="font-family:var(--mono);font-size:12px;">${r.교환일||''}</td>
      <td>${ok
        ? '<span class="tag tok"><span class="tdot"></span>수거 완료</span>'
        : '<span class="tag tfail"><span class="tdot"></span>미수거</span>'}</td>
      <td>${cd?`<span class="date-ok">${cd}</span>`:'<span style="color:var(--dim)">—</span>'}</td>
      <td><span class="memo">${!ok?'고품 미수거':''}</span></td>
    </tr>`;
  }).join('');
}

/* ── 관리 ── */
async function fetchAdmin(){
  sL('a');
  const{data}=await sb.from('qr_returns').select('*').order('created_at',{ascending:false});
  AD=data||[]; renderAdmin(AD);
}
function filterAdmin(){
  const s=document.getElementById('as').value, e=document.getElementById('ae').value;
  if(!s||!e){ fetchAdmin(); return; }
  renderAdmin(AD.filter(i=>i.교환일>=s&&i.교환일<=e));
}
function renderAdmin(data){
  hL('a');
  if(!data.length){ document.getElementById('ae2').style.display='block'; return; }
  document.getElementById('at').style.display='table';
  document.getElementById('ab').innerHTML=data.map(r=>`
    <tr id="row-${r.id}">
      <td><input type="checkbox" class="row-check" value="${r.id}" style="accent-color:var(--p);"></td>
      <td><img style="width:44px;border-radius:6px;border:1px solid var(--border);" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${r.id}"></td>
      <td><span class="vin-val" style="font-size:12px;">${r.차대번호}</span></td>
      <td>
        <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);">${r.품번}</div>
        <div class="pn-val">${r.품명}</div>
      </td>
      <td id="mc-${r.id}"><div class="mc">
        ${r.bmw_qr_code
          ? '<span class="tag tok"><span class="tdot"></span>수거 완료</span>'
          : `<button class="bmatch" onclick="startScan('${r.id}','${r.차대번호}','${r.품번}')">🔗 출고서 매칭</button>`}
      </div></td>
      <td><div style="display:flex;gap:6px;">
        <button class="mbtn" onclick="printSingle('${r.id}')">🖨 인쇄</button>
        <button class="mbtn del" onclick="deleteItem('${r.id}')">삭제</button>
      </div></td>
    </tr>`).join('');
}

/* ── 스캐너 ── */
function startScan(id,vin,part){
  document.getElementById('scanner-modal').style.display='flex';
  QR=new Html5Qrcode("reader");
  QR.start({facingMode:"environment"},{fps:10,qrbox:250},async(decoded)=>{
    const f=decoded.split(',');
    if(f.length<12) return alert("올바른 QR 형식이 아닙니다.");
    const sv=f[2],sp=f[9];
    const vm=vin.includes(sv)||sv.includes(vin.slice(-7));
    const pm=part.replace(/[^a-zA-Z0-9]/g,'')===sp.replace(/[^a-zA-Z0-9]/g,'');
    if(vm&&pm){
      if(confirm(`✓ 일치 확인\n수거 완료 처리하시겠습니까?`)){
        const{error}=await sb.from('qr_returns').update({
          bmw_qr_code:decoded, 차대번호:sv, 품번:sp,
          교환일:`20${f[7].substring(0,2)}-${f[7].substring(2,4)}-${f[7].substring(4,6)}`
        }).eq('id',id);
        if(error){ alert("실패: "+error.message); return; }
        closeScanner();
        const mc=document.getElementById(`mc-${id}`);
        if(mc){
          const div=mc.querySelector('.mc'), btn=div.querySelector('.bmatch');
          const badge=document.createElement('span');
          badge.className='badge-anim';
          badge.innerHTML='<span class="tdot"></span>수거 완료';
          if(btn){
            btn.insertAdjacentElement('afterend',badge);
            setTimeout(()=>{ btn.style.transition='opacity 0.3s'; btn.style.opacity='0'; setTimeout(()=>btn.remove(),300); },600);
          } else div.appendChild(badge);
        }
        const row=document.getElementById(`row-${id}`);
        if(row) row.classList.add('row-ok');
        const item=AD.find(i=>String(i.id)===String(id));
        if(item) item.bmw_qr_code=decoded;
        DD=[];
      }
    } else {
      alert(`✗ 불일치\n기존: ${vin} / ${part}\n스캔: ${sv} / ${sp}`);
      closeScanner();
    }
  });
}
function closeScanner(){
  if(QR){ QR.stop().then(()=>{ document.getElementById('scanner-modal').style.display='none'; QR=null; }).catch(console.error); }
  else document.getElementById('scanner-modal').style.display='none';
}

/* ── 엑셀/인쇄 ── */
function exportExcel(){
  const ws=XLSX.utils.json_to_sheet(AD), wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Returns");
  XLSX.utils.writeFile(wb,`BMW_Returns_${today}.xlsx`);
}
function printSingle(id){
  const item=AD.find(i=>String(i.id)===String(id)); if(!item)return;
  document.getElementById('print-area').innerHTML=lbl(item);
  document.getElementById('print-area').style.display='grid';
  setTimeout(()=>{ window.print(); document.getElementById('print-area').style.display='none'; },300);
}
function printSelected(){
  const ids=Array.from(document.querySelectorAll('.row-check:checked')).map(c=>c.value);
  if(!ids.length)return alert("항목을 선택하세요.");
  document.getElementById('print-area').innerHTML=AD.filter(i=>ids.includes(String(i.id))).map(lbl).join('');
  document.getElementById('print-area').style.display='grid';
  setTimeout(()=>{ window.print(); document.getElementById('print-area').style.display='none'; },500);
}
function lbl(r){
  const q=`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${r.id}`;
  return `<div class="label-card"><div class="qr-side"><img src="${q}"></div><div class="info-side"><div style="font-size:12px;font-weight:700;">날짜: ${r.교환일} / 작업자: ${r.작업자}</div><div style="font-size:12px;font-weight:700;margin-top:2px;">품명: ${r.품명}</div><div class="data-box"><div style="font-size:9px;font-weight:bold;">PART NUMBER</div><div class="val-text">${r.품번}</div><div style="font-size:9px;font-weight:bold;margin-top:5px;">VIN (LAST 7)</div><div class="val-text">${r.차대번호.slice(-7)}</div></div></div></div>`;
}
async function deleteItem(id){ if(confirm("삭제하시겠습니까?")){ await sb.from('qr_returns').delete().eq('id',id); fetchAdmin(); } }
function toggleAll(s){ document.querySelectorAll('.row-check').forEach(c=>c.checked=s.checked); }
function sL(p){ document.getElementById(p+'l').style.display='block'; document.getElementById(p==='d'?'dt':'at').style.display='none'; document.getElementById(p==='d'?'de2':'ae2').style.display='none'; }
function hL(p){ document.getElementById(p+'l').style.display='none'; }
</script>
