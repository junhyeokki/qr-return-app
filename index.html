<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고품 QR 생성</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #1a1a1a; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 14px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        button { width: 100%; margin-top: 20px; padding: 14px; background: #3ecf8e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
        #qr-result { margin-top: 24px; text-align: center; display: none; }
        canvas { max-width: 100%; height: auto !important; margin: 0 auto; }
        .success-msg { background: #e6f9f0; color: #0a7a4a; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>고품 QR 생성</h1>
    <label>품번</label><input type="text" id="품번">
    <label>품명</label><input type="text" id="품명">
    <label>교환일</label><input type="date" id="교환일">
    <label>수량</label><input type="number" id="수량" value="1">
    <label>작업자</label><input type="text" id="작업자">
    <label>수리항목</label><input type="text" id="수리항목">
    
    <button onclick="generateQR()">QR 생성</button>
    
    <div class="success-msg" id="success-msg">저장 완료!</div>
    <div id="qr-result">
        <canvas id="qr-canvas"></canvas>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function generateQR() {
        // 라이브러리 로드 확인 (가장 중요)
        if (typeof QRCode === 'undefined') {
            alert('QR 라이브러리가 아직 로드되지 않았습니다. 잠시 후 다시 시도하거나 페이지를 새로고침 해주세요.');
            return;
        }

        const data = {
            품번: document.getElementById('품번').value.trim(),
            품명: document.getElementById('품명').value.trim(),
            교환일: document.getElementById('교환일').value,
            수량: parseInt(document.getElementById('수량').value),
            작업자: document.getElementById('작업자').value.trim(),
            수리항목: document.getElementById('수리항목').value.trim()
        };

        if (!data.품번 || !data.품명 || !data.교환일 || !data.작업자) {
            alert('필수 항목을 입력해주세요.'); return;
        }

        const qr_text = Object.entries(data).map(([k, v]) => `${k}:${v}`).join(' | ');

        try {
            // Supabase 저장
            const { error } = await sb.from('qr_returns').insert({...data, qr_data: qr_text});
            if (error) throw error;

            // QR 생성
            await QRCode.toCanvas(document.getElementById('qr-canvas'), qr_text, { width: 240 });
            
            document.getElementById('qr-result').style.display = 'block';
            document.getElementById('success-msg').style.display = 'block';
        } catch (e) {
            alert('오류: ' + e.message);
        }
    }
</script>
</body>
</html>
