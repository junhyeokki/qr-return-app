<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고품 QR 생성</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #1a1a1a; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 14px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
  input:focus { border-color: #3ecf8e; }
  button { width: 100%; margin-top: 20px; padding: 14px; background: #3ecf8e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
  button:active { background: #2db87a; }
  #qr-result { margin-top: 24px; text-align: center; display: none; }
  #qr-result p { margin-top: 10px; font-size: 13px; color: #888; }
  .success-msg { background: #e6f9f0; color: #0a7a4a; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>고품 QR 생성</h1>
  <label>품번</label>
  <input type="text" id="품번" placeholder="예: A-1234">
  <label>품명</label>
  <input type="text" id="품명" placeholder="예: 브레이크 패드">
  <label>교환일</label>
  <input type="date" id="교환일">
  <label>수량</label>
  <input type="number" id="수량" placeholder="예: 2" min="1">
  <label>작업자</label>
  <input type="text" id="작업자" placeholder="이름 입력">
  <label>수리항목</label>
  <input type="text" id="수리항목" placeholder="예: 엔진오일 교환">
  <button onclick="generateQR()">QR 생성</button>
  <div class="success-msg" id="success-msg">저장 완료! QR을 출력하세요.</div>
  <div id="qr-result">
    <canvas id="qr-canvas"></canvas>
    <p>이 QR을 스캔하면 반납 정보를 확인할 수 있어요</p>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co'
const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao'
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function generateQR() {
  const 품번 = document.getElementById('품번').value.trim()
  const 품명 = document.getElementById('품명').value.trim()
  const 교환일 = document.getElementById('교환일').value
  const 수량 = parseInt(document.getElementById('수량').value)
  const 작업자 = document.getElementById('작업자').value.trim()
  const 수리항목 = document.getElementById('수리항목').value.trim()

  if (!품번 || !품명 || !교환일 || !수량 || !작업자) {
    alert('필수 항목을 모두 입력해주세요.')
    return
  }

  const qr_data = `품번:${품번} | 품명:${품명} | 교환일:${교환일} | 수량:${수량} | 작업자:${작업자} | 수리:${수리항목}`

  const { error } = await sb.from('qr_returns').insert({
    품번, 품명, 교환일, 수량, 작업자, 수리항목, qr_data
  })

  if (error) { alert('저장 실패: ' + error.message); return }

  await QRCode.toCanvas(document.getElementById('qr-canvas'), qr_data, { width: 240 })
  document.getElementById('qr-result').style.display = 'block'
  document.getElementById('success-msg').style.display = 'block'
}
</script>
</body>
</html>
