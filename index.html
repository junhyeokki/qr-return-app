<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고품 QR 생성 시스템</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #1a1a1a; text-align: center; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        button { width: 100%; margin-top: 20px; padding: 14px; background: #3ecf8e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
        #qr-result { margin-top: 24px; text-align: center; display: none; border-top: 1px dashed #eee; padding-top: 20px; }
        canvas { max-width: 100%; height: auto !important; margin: 0 auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        .success-msg { background: #e6f9f0; color: #0a7a4a; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>고품 QR 생성</h1>
    <label>품번</label><input type="text" id="품번" placeholder="12418571349">
    <label>품명</label><input type="text" id="품명" placeholder="스타터 모터">
    <label>교환일</label><input type="date" id="교환일">
    <label>수량</label><input type="number" id="수량" value="1">
    <label>작업자</label><input type="text" id="작업자" placeholder="홍길동">
    <label>수리항목</label><input type="text" id="수리항목" placeholder="리콜 수리">
    
    <button onclick="generateQR()">QR 생성 및 저장</button>
    
    <div class="success-msg" id="success-msg">✅ 서버 저장 완료!</div>
    <div id="qr-result">
        <canvas id="qr-canvas"></canvas>
        <p style="margin-top:10px; color:#666; font-size:12px;">스캔 시 상세페이지로 이동합니다.</p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function generateQR() {
        if (typeof QRCode === 'undefined') { alert('라이브러리 로딩 중입니다.'); return; }

        const rowData = {
            품번: document.getElementById('품번').value.trim(),
            품명: document.getElementById('품명').value.trim(),
            교환일: document.getElementById('교환일').value,
            수량: parseInt(document.getElementById('수량').value),
            작업자: document.getElementById('작업자').value.trim(),
            수리항목: document.getElementById('수리항목').value.trim()
        };

        if (!rowData.품번 || !rowData.품명 || !rowData.교환일 || !rowData.작업자) {
            alert('모든 필수 항목을 입력해주세요.'); return;
        }

        try {
            // 1. Supabase 저장
            const { data, error } = await sb.from('qr_returns').insert([rowData]).select();
            if (error) throw error;

            // 2. 중요: HTTPS를 포함한 전체 주소 생성
            // 깃허브 아이디와 레포지토리 이름이 정확한지 확인하세요.
            const resultPageUrl = `https://junhyeokki.github.io/qr-return-app/result.html?id=${data[0].id}`;

            // 3. QR 생성 (URL 주소를 담음)
            await QRCode.toCanvas(document.getElementById('qr-canvas'), resultPageUrl, { 
                width: 240,
                margin: 2
            });
            
            document.getElementById('qr-result').style.display = 'block';
            document.getElementById('success-msg').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        } catch (e) {
            alert('저장 실패: ' + e.message);
        }
    }
</script>
</body>
</html>
