<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTS RETURN SYSTEM</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:    #0a0c14;
  --ink2:   #13161f;
  --ink3:   #1c2030;
  --line:   rgba(255,255,255,0.07);
  --text:   #e8eaf0;
  --dim:    rgba(232,234,240,0.4);
  --accent: #4f8fff;
  --green:  #00e5a0;
  --red:    #ff5f5f;
  --purple: #a78bfa;
  --mono:   'JetBrains Mono', monospace;
  --sans:   'Noto Sans KR', sans-serif;
  --display:'Bebas Neue', sans-serif;
}
html,body { height:100%; overflow:hidden; }
body { font-family:var(--sans); background:var(--ink); color:var(--text); display:flex; }

/* ── 사이드바 ── */
.sidebar {
  width:72px; background:var(--ink2); border-right:1px solid var(--line);
  display:flex; flex-direction:column; align-items:center; padding:20px 0; gap:4px; flex-shrink:0;
}
.logo {
  font-family:var(--display); font-size:20px; color:var(--accent);
  letter-spacing:2px; writing-mode:vertical-rl; transform:rotate(180deg);
  margin-bottom:28px; line-height:1;
}
.nav {
  width:46px; height:48px; border-radius:12px; border:none;
  background:transparent; color:var(--dim); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  font-size:18px; transition:all 0.18s;
}
.nav span.lbl { font-family:var(--sans); font-size:8px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; }
.nav:hover { background:rgba(255,255,255,0.06); color:var(--text); }
.nav.on { background:var(--accent); color:#fff; box-shadow:0 4px 20px rgba(79,143,255,0.3); }
.sidebar-bot { margin-top:auto; }

/* ── 메인 ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar {
  height:54px; background:var(--ink2); border-bottom:1px solid var(--line);
  display:flex; align-items:center; padding:0 28px; gap:14px; flex-shrink:0;
}
.tb-title { font-family:var(--display); font-size:22px; letter-spacing:3px; }
.tb-sub {
  font-family:var(--mono); font-size:11px; color:var(--dim);
  border-left:1px solid var(--line); padding-left:14px;
}
.tb-right { margin-left:auto; display:flex; gap:8px; }

.btn {
  padding:7px 14px; border-radius:8px; border:none; font-size:12px; font-weight:700;
  font-family:var(--sans); cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  transition:all 0.15s; letter-spacing:0.2px;
}
.btn-a { background:var(--accent); color:#fff; }
.btn-a:hover { background:#3a78ff; box-shadow:0 4px 14px rgba(79,143,255,0.35); }
.btn-g { background:var(--ink3); color:var(--dim); border:1px solid var(--line); }
.btn-g:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }

.scroll { flex:1; overflow-y:auto; padding:24px 28px; }
.scroll::-webkit-scrollbar { width:3px; }
.scroll::-webkit-scrollbar-thumb { background:var(--line); border-radius:3px; }

.page { display:none; }
.page.on { display:block; animation:up 0.22s ease; }
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── 스탯 ── */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px; }
@media(max-width:640px){ .stats{grid-template-columns:repeat(2,1fr);} }
.sc {
  background:var(--ink2); border:1px solid var(--line); border-radius:14px;
  padding:18px 20px; position:relative; overflow:hidden; transition:border-color 0.2s;
}
.sc::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; }
.sc:nth-child(1)::before { background:var(--accent); }
.sc:nth-child(2)::before { background:var(--green); }
.sc:nth-child(3)::before { background:var(--red); }
.sc:nth-child(4)::before { background:var(--purple); }
.sc:hover { border-color:rgba(255,255,255,0.12); }
.sc .lbl { font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
.sc .val { font-family:var(--display); font-size:46px; line-height:1; letter-spacing:2px; }
.sc:nth-child(1) .val { color:var(--accent); }
.sc:nth-child(2) .val { color:var(--green); }
.sc:nth-child(3) .val { color:var(--red); }
.sc:nth-child(4) .val { color:var(--purple); }
.sc .ico { position:absolute; right:14px; bottom:10px; font-size:30px; opacity:0.07; }

/* ── 필터 ── */
.frow { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.flbl { font-family:var(--mono); font-size:10px; letter-spacing:1px; color:var(--dim); text-transform:uppercase; }
.finput {
  background:var(--ink2); border:1px solid var(--line); border-radius:8px;
  padding:7px 11px; font-size:12px; font-family:var(--mono); color:var(--text); outline:none;
  transition:border-color 0.15s;
}
.finput:focus { border-color:var(--accent); }
.fsep { color:var(--dim); font-size:12px; }

/* ── 탭 ── */
.tabs {
  display:flex; gap:3px; margin-bottom:14px;
  background:var(--ink2); border:1px solid var(--line); border-radius:10px;
  padding:4px; width:fit-content;
}
.tab {
  padding:5px 16px; border-radius:7px; border:none; background:transparent;
  color:var(--dim); font-size:11px; font-weight:700; font-family:var(--mono);
  cursor:pointer; transition:all 0.15s; letter-spacing:0.5px;
}
.tab:hover { color:var(--text); }
.tab.ta { background:var(--accent); color:#fff; }
.tab.tg { background:var(--green); color:var(--ink); }
.tab.tr { background:var(--red); color:#fff; }

/* ── 테이블 ── */
.tw { background:var(--ink2); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead tr { border-bottom:1px solid var(--line); background:rgba(255,255,255,0.02); }
th {
  padding:11px 15px; text-align:left; font-family:var(--mono);
  font-size:9px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:1px; white-space:nowrap;
}
td { padding:13px 15px; font-size:13px; border-bottom:1px solid var(--line); vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:rgba(255,255,255,0.02); }

.mv { font-family:var(--mono); font-weight:700; font-size:12px; color:var(--accent); }
.pn { font-size:11px; color:var(--dim); margin-top:2px; }

.tag {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:6px; font-family:var(--mono);
  font-size:10px; font-weight:700; letter-spacing:0.5px; white-space:nowrap;
}
.tok  { background:rgba(0,229,160,0.1); color:var(--green); border:1px solid rgba(0,229,160,0.2); }
.tfail{ background:rgba(255,95,95,0.1);  color:var(--red);   border:1px solid rgba(255,95,95,0.2); }
.tdot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }

.bmatch {
  background:rgba(79,143,255,0.12); color:var(--accent);
  border:1px solid rgba(79,143,255,0.25); padding:5px 12px; border-radius:6px;
  font-size:11px; font-weight:700; font-family:var(--mono); cursor:pointer; transition:all 0.15s;
}
.bmatch:hover { background:rgba(79,143,255,0.22); }

.badge-ok {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:6px; font-size:11px; font-weight:700; font-family:var(--mono);
  background:rgba(0,229,160,0.12); color:var(--green); border:1px solid rgba(0,229,160,0.25);
  opacity:0; transform:scale(0.7) translateX(-6px);
  animation: bIn 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards, glow 1.4s ease-out 0.38s 2;
}
@keyframes bIn { to{opacity:1;transform:scale(1) translateX(0);} }
@keyframes glow { 0%{box-shadow:0 0 0 0 rgba(0,229,160,0.4);} 70%{box-shadow:0 0 0 8px rgba(0,229,160,0);} 100%{box-shadow:0 0 0 0 rgba(0,229,160,0);} }
.row-ok { animation:rflash 0.7s ease forwards; }
@keyframes rflash { 0%{background:rgba(0,229,160,0.07);} 100%{background:transparent;} }
.mc { display:flex; align-items:center; gap:8px; }

.mbtn {
  padding:4px 10px; border-radius:5px; font-size:11px; font-family:var(--mono); font-weight:700;
  cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--dim); transition:all 0.15s;
}
.mbtn:hover { color:var(--text); border-color:rgba(255,255,255,0.18); }
.mbtn.del:hover { color:var(--red); border-color:rgba(255,95,95,0.3); }

.loading { text-align:center; padding:55px; color:var(--dim); font-family:var(--mono); font-size:11px; letter-spacing:1px; }
.spinner { width:22px;height:22px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; margin:0 auto 12px; }
@keyframes spin{to{transform:rotate(360deg)}}
.empty { text-align:center; padding:55px; color:var(--dim); font-family:var(--mono); font-size:11px; letter-spacing:2px; }

/* ── 스캐너 ── */
#scanner-modal {
  display:none; position:fixed; inset:0;
  background:rgba(10,12,20,0.96); z-index:2000;
  justify-content:center; align-items:center; flex-direction:column; gap:20px;
  backdrop-filter:blur(10px);
}
.scan-title { font-family:var(--display); font-size:30px; letter-spacing:4px; color:var(--accent); }
#reader { width:90%; max-width:400px; border-radius:14px; overflow:hidden; border:1px solid var(--line); }

/* ── 인쇄 ── */
@media print {
  @page{size:A4;margin:0;}
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{position:absolute;left:0;top:0;width:210mm;display:grid!important;grid-template-columns:105mm 105mm;grid-auto-rows:74.25mm;}
  .label-card{width:105mm;height:74.25mm;border:0.1mm solid #000;box-sizing:border-box;display:flex!important;padding:8mm;align-items:center;page-break-inside:avoid;}
  .qr-side{width:35mm;} .qr-side img{width:32mm!important;height:32mm!important;}
  .info-side{flex:1;margin-left:6mm;}
  .data-box{border-top:2px solid #000;margin-top:4mm;padding-top:3mm;}
  .val-text{font-family:'JetBrains Mono';font-size:17pt;font-weight:800;}
}
#print-area{display:none;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">PRS</div>
  <button class="nav on" id="nb-dash" onclick="goPage('dash')">
    <span>📊</span><span class="lbl">현황</span>
  </button>
  <button class="nav" id="nb-admin" onclick="goPage('admin')">
    <span>⚙️</span><span class="lbl">관리</span>
  </button>
  <div class="sidebar-bot"></div>
</div>

<div class="main">
  <div class="topbar">
    <div class="tb-title" id="tb-t">RETURN STATUS</div>
    <div class="tb-sub" id="tb-s">반납 현황 대시보드</div>
    <div class="tb-right" id="tb-r"></div>
  </div>

  <div class="scroll">

    <!-- 현황 -->
    <div class="page on" id="page-dash">
      <div class="frow">
        <span class="flbl">period</span>
        <input class="finput" type="date" id="ds">
        <span class="fsep">→</span>
        <input class="finput" type="date" id="de">
        <button class="btn btn-a" onclick="loadDash()">조회</button>
        <button class="btn btn-g" onclick="resetDash()">초기화</button>
      </div>

      <div class="stats">
        <div class="sc"><div class="lbl">Total Claims</div><div class="val" id="sv-t">—</div><div class="ico">📦</div></div>
        <div class="sc"><div class="lbl">Collected</div><div class="val" id="sv-ok">—</div><div class="ico">✅</div></div>
        <div class="sc"><div class="lbl">Pending</div><div class="val" id="sv-f">—</div><div class="ico">⏳</div></div>
        <div class="sc"><div class="lbl">Scanned</div><div class="val" id="sv-s">—</div><div class="ico">🔍</div></div>
      </div>

      <div class="tabs">
        <button class="tab ta" id="dt-all"  onclick="setDF('all')">ALL</button>
        <button class="tab"    id="dt-ok"   onclick="setDF('ok')">COLLECTED</button>
        <button class="tab"    id="dt-fail" onclick="setDF('fail')">PENDING</button>
      </div>

      <div class="tw">
        <div class="loading" id="dl"><div class="spinner"></div>LOADING...</div>
        <table id="dt" style="display:none;">
          <thead><tr>
            <th>ID / 품번</th><th>VIN LAST 7</th><th>품명</th>
            <th>작업자</th><th>교환일</th><th>상태</th><th>수거일</th><th>비고</th>
          </tr></thead>
          <tbody id="db"></tbody>
        </table>
        <div class="empty" id="de" style="display:none;">— NO DATA —</div>
      </div>
    </div>

    <!-- 관리 -->
    <div class="page" id="page-admin">
      <div class="frow">
        <span class="flbl">period</span>
        <input class="finput" type="date" id="as">
        <span class="fsep">→</span>
        <input class="finput" type="date" id="ae">
        <button class="btn btn-a" onclick="filterAdmin()">적용</button>
        <button class="btn btn-g" onclick="fetchAdmin()">전체보기</button>
      </div>

      <div class="tw">
        <div class="loading" id="al"><div class="spinner"></div>LOADING...</div>
        <table id="at" style="display:none;">
          <thead><tr>
            <th style="width:28px;"><input type="checkbox" onclick="toggleAll(this)" style="accent-color:var(--accent);"></th>
            <th>QR</th><th>차대번호</th><th>부품 정보</th><th>매칭 / 상태</th><th>액션</th>
          </tr></thead>
          <tbody id="ab"></tbody>
        </table>
        <div class="empty" id="ae2" style="display:none;">— NO DATA —</div>
      </div>
    </div>

  </div>
</div>

<div id="scanner-modal">
  <div class="scan-title">QR SCAN</div>
  <div id="reader"></div>
  <button class="btn btn-g" onclick="closeScanner()">✕ 닫기</button>
</div>
<div id="print-area"></div>

<script>
const SURL='https://dgmmcypqrqciuoqvmymj.supabase.co';
const SKEY='sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
const sb=window.supabase.createClient(SURL,SKEY);
let DD=[],AD=[],DF='all',QR;
const today=new Date().toISOString().slice(0,10);
const w7=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
document.getElementById('ds').value=w7;
document.getElementById('de').value=today;
window.onload=loadDash;

function goPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+n).classList.add('on');
  document.getElementById('nb-'+n).classList.add('on');
  if(n==='dash'){
    document.getElementById('tb-t').textContent='RETURN STATUS';
    document.getElementById('tb-s').textContent='반납 현황 대시보드';
    document.getElementById('tb-r').innerHTML='';
    if(!DD.length) loadDash();
  } else {
    document.getElementById('tb-t').textContent='QR MANAGER';
    document.getElementById('tb-s').textContent='QR 관리 · 매칭';
    document.getElementById('tb-r').innerHTML=`
      <button class="btn btn-g" onclick="exportExcel()">📊 엑셀</button>
      <button class="btn btn-a" onclick="printSelected()">🖨 병합인쇄</button>`;
    if(!AD.length) fetchAdmin();
  }
}

async function loadDash(){
  sL('d');
  const s=document.getElementById('ds').value, e=document.getElementById('de').value;
  let q=sb.from('qr_returns').select('*').order('created_at',{ascending:false});
  if(s) q=q.gte('교환일',s); if(e) q=q.lte('교환일',e);
  const{data}=await q; DD=data||[];
  const t=DD.length, ok=DD.filter(d=>d.bmw_qr_code).length;
  document.getElementById('sv-t').textContent=t;
  document.getElementById('sv-ok').textContent=ok;
  document.getElementById('sv-f').textContent=t-ok;
  document.getElementById('sv-s').textContent=ok;
  renderDash(DF);
}
function resetDash(){ document.getElementById('ds').value=w7; document.getElementById('de').value=today; loadDash(); }
function setDF(f){
  DF=f;
  ['all','ok','fail'].forEach(k=>{ document.getElementById('dt-'+k).className='tab'; });
  document.getElementById('dt-'+f).classList.add(f==='all'?'ta':f==='ok'?'tg':'tr');
  renderDash(f);
}
function renderDash(f){
  let rows=DD;
  if(f==='ok')   rows=DD.filter(d=>d.bmw_qr_code);
  if(f==='fail') rows=DD.filter(d=>!d.bmw_qr_code);
  hL('d');
  if(!rows.length){ document.getElementById('de').style.display='block'; return; }
  document.getElementById('dt').style.display='table';
  document.getElementById('db').innerHTML=rows.map(r=>{
    const ok=!!r.bmw_qr_code; let cd='';
    if(ok){ const f=r.bmw_qr_code.split(','); if(f[7]?.length===6) cd=`20${f[7].substring(0,2)}-${f[7].substring(2,4)}-${f[7].substring(4,6)}`; if(!cd&&r.created_at) cd=r.created_at.slice(0,10); }
    return `<tr>
      <td><div class="mv">${r.id.slice(0,8).toUpperCase()}</div><div class="pn">${r.품번}</div></td>
      <td><span class="mv">${r.차대번호.slice(-7)}</span></td>
      <td>${r.품명}</td>
      <td style="color:var(--dim);font-size:12px;">${r.작업자}</td>
      <td style="font-family:var(--mono);font-size:12px;">${r.교환일||''}</td>
      <td>${ok?'<span class="tag tok"><span class="tdot"></span>COLLECTED</span>':'<span class="tag tfail"><span class="tdot"></span>PENDING</span>'}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--accent);">${cd||'—'}</td>
      <td style="font-size:11px;color:var(--dim);">${!ok?'미수거':''}</td>
    </tr>`;
  }).join('');
}

async function fetchAdmin(){
  sL('a');
  const{data}=await sb.from('qr_returns').select('*').order('created_at',{ascending:false});
  AD=data||[]; renderAdmin(AD);
}
function filterAdmin(){
  const s=document.getElementById('as').value, e=document.getElementById('ae').value;
  if(!s||!e){ fetchAdmin(); return; }
  renderAdmin(AD.filter(i=>i.교환일>=s&&i.교환일<=e));
}
function renderAdmin(data){
  hL('a');
  if(!data.length){ document.getElementById('ae2').style.display='block'; return; }
  document.getElementById('at').style.display='table';
  document.getElementById('ab').innerHTML=data.map(r=>`
    <tr id="row-${r.id}">
      <td><input type="checkbox" class="row-check" value="${r.id}" style="accent-color:var(--accent);"></td>
      <td><img style="width:42px;border-radius:6px;border:1px solid var(--line);" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${r.id}&color=4f8fff&bgcolor=13161f"></td>
      <td><span class="mv">${r.차대번호}</span></td>
      <td><div style="font-family:var(--mono);font-size:12px;font-weight:700;">${r.품번}</div><div class="pn">${r.품명}</div></td>
      <td id="mc-${r.id}"><div class="mc">
        ${r.bmw_qr_code
          ? '<span class="tag tok"><span class="tdot"></span>COLLECTED</span>'
          : `<button class="bmatch" onclick="startScan('${r.id}','${r.차대번호}','${r.품번}')">⟳ 출고서 매칭</button>`}
      </div></td>
      <td><div style="display:flex;gap:5px;">
        <button class="mbtn" onclick="printSingle('${r.id}')">🖨</button>
        <button class="mbtn del" onclick="deleteItem('${r.id}')">✕</button>
      </div></td>
    </tr>`).join('');
}

function startScan(id,vin,part){
  document.getElementById('scanner-modal').style.display='flex';
  QR=new Html5Qrcode("reader");
  QR.start({facingMode:"environment"},{fps:10,qrbox:250},async(decoded)=>{
    const f=decoded.split(',');
    if(f.length<12) return alert("올바른 QR 형식이 아닙니다.");
    const sv=f[2],sp=f[9];
    const vm=vin.includes(sv)||sv.includes(vin.slice(-7));
    const pm=part.replace(/[^a-zA-Z0-9]/g,'')===sp.replace(/[^a-zA-Z0-9]/g,'');
    if(vm&&pm){
      if(confirm(`✓ 일치 확인\n수거 완료 처리하시겠습니까?`)){
        const{error}=await sb.from('qr_returns').update({
          bmw_qr_code:decoded,차대번호:sv,품번:sp,
          교환일:`20${f[7].substring(0,2)}-${f[7].substring(2,4)}-${f[7].substring(4,6)}`
        }).eq('id',id);
        if(error){alert("실패: "+error.message);return;}
        closeScanner();
        const mc=document.getElementById(`mc-${id}`);
        if(mc){
          const div=mc.querySelector('.mc'), btn=div.querySelector('.bmatch');
          const badge=document.createElement('span');
          badge.className='badge-ok'; badge.innerHTML='<span class="tdot"></span>COLLECTED';
          if(btn){
            btn.insertAdjacentElement('afterend',badge);
            setTimeout(()=>{btn.style.transition='opacity 0.3s';btn.style.opacity='0';setTimeout(()=>btn.remove(),300);},600);
          } else div.appendChild(badge);
        }
        const row=document.getElementById(`row-${id}`);
        if(row) row.classList.add('row-ok');
        const item=AD.find(i=>String(i.id)===String(id));
        if(item) item.bmw_qr_code=decoded;
        DD=[];
      }
    } else {
      alert(`✗ 불일치\n기존: ${vin} / ${part}\n스캔: ${sv} / ${sp}`);
      closeScanner();
    }
  });
}
function closeScanner(){
  if(QR){ QR.stop().then(()=>{document.getElementById('scanner-modal').style.display='none';QR=null;}).catch(console.error); }
  else document.getElementById('scanner-modal').style.display='none';
}

function exportExcel(){
  const ws=XLSX.utils.json_to_sheet(AD), wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Returns");
  XLSX.utils.writeFile(wb,`BMW_Returns_${today}.xlsx`);
}
function printSingle(id){
  const item=AD.find(i=>String(i.id)===String(id)); if(!item)return;
  document.getElementById('print-area').innerHTML=lbl(item);
  document.getElementById('print-area').style.display='grid';
  setTimeout(()=>{window.print();document.getElementById('print-area').style.display='none';},300);
}
function printSelected(){
  const ids=Array.from(document.querySelectorAll('.row-check:checked')).map(c=>c.value);
  if(!ids.length)return alert("항목을 선택하세요.");
  document.getElementById('print-area').innerHTML=AD.filter(i=>ids.includes(String(i.id))).map(lbl).join('');
  document.getElementById('print-area').style.display='grid';
  setTimeout(()=>{window.print();document.getElementById('print-area').style.display='none';},500);
}
function lbl(r){
  const q=`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://junhyeokki.github.io/qr-return-app/result.html?id=${r.id}`;
  return `<div class="label-card"><div class="qr-side"><img src="${q}"></div><div class="info-side"><div style="font-size:12px;font-weight:700;">날짜: ${r.교환일} / 작업자: ${r.작업자}</div><div style="font-size:12px;font-weight:700;margin-top:2px;">품명: ${r.품명}</div><div class="data-box"><div style="font-size:9px;font-weight:bold;">PART NUMBER</div><div class="val-text">${r.품번}</div><div style="font-size:9px;font-weight:bold;margin-top:5px;">VIN (LAST 7)</div><div class="val-text">${r.차대번호.slice(-7)}</div></div></div></div>`;
}
async function deleteItem(id){ if(confirm("삭제하시겠습니까?")){ await sb.from('qr_returns').delete().eq('id',id); fetchAdmin(); } }
function toggleAll(s){ document.querySelectorAll('.row-check').forEach(c=>c.checked=s.checked); }
function sL(p){ document.getElementById(p+'l').style.display='block'; document.getElementById(p==='d'?'dt':'at').style.display='none'; document.getElementById(p==='d'?'de':'ae2').style.display='none'; }
function hL(p){ document.getElementById(p+'l').style.display='none'; }
</script>
