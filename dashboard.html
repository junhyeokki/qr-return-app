<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고품 반납 현황</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fc;
    --white: #ffffff;
    --primary: #1c69d4;
    --primary-light: #e8f0fd;
    --success: #0d9e5c;
    --success-light: #e6f7f0;
    --danger: #e03131;
    --danger-light: #fff0f0;
    --warning: #f59f00;
    --text: #1a1d27;
    --text-sub: #6b7280;
    --border: #e9ecf0;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  .top-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .top-bar .branch-badge {
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── 본문 ── */
  .page { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

  /* ── 필터 바 ── */
  .filter-bar {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .filter-bar label { font-size: 13px; color: var(--text-sub); font-weight: 500; }
  .filter-bar input[type="date"] {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    background: var(--bg);
  }
  .filter-bar input[type="date"]:focus { border-color: var(--primary); }
  .filter-bar select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    background: var(--bg);
    cursor: pointer;
  }
  .btn-search {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }
  .btn-search:hover { background: #1558b0; }

  /* ── 통계 카드 ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  @media (max-width: 768px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }

  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(12px);
    animation: cardIn 0.4s ease forwards;
  }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s;  border-left: 3px solid var(--success); }
  .stat-card:nth-child(3) { animation-delay: 0.15s; border-left: 3px solid var(--danger); }
  .stat-card:nth-child(4) { animation-delay: 0.2s;  border-left: 3px solid var(--primary); }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }
  .stat-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }
  .stat-card:nth-child(2) .value { color: var(--success); }
  .stat-card:nth-child(3) .value { color: var(--danger); }
  .stat-card:nth-child(4) .value { color: var(--primary); }

  /* ── 탭 ── */
  .tab-wrap {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--white);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
  .tab-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  .tab-btn.active-success {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .tab-btn.active-danger {
    background: var(--danger);
    border-color: var(--danger);
    color: white;
  }

  /* ── 테이블 ── */
  .table-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 2px solid var(--border); }
  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    background: #fafbfc;
  }
  td {
    padding: 14px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: #f9fafc; }

  .claim-no {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    color: var(--primary);
  }
  .part-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
  }
  .vin-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  /* 수거 상태 뱃지 */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }
  .badge-ok {
    background: var(--success-light);
    color: var(--success);
    border: 1px solid #b6ead3;
  }
  .badge-fail {
    background: var(--danger-light);
    color: var(--danger);
    border: 1px solid #ffc9c9;
  }

  .date-text { color: var(--primary); font-weight: 600; font-size: 13px; }
  .memo-text { color: var(--text-sub); font-size: 12px; }

  /* 로딩 */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text-sub);
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 60px; color: var(--text-sub); font-size: 14px; }

  /* 수거일자 없으면 — */
  .dash { color: #ccc; font-size: 16px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>📦 고품 반납 현황</h1>
  <span class="branch-badge" id="branch-label">전주점</span>
</div>

<div class="page">

  <!-- 필터 -->
  <div class="filter-bar">
    <label>기간</label>
    <input type="date" id="startDate">
    <span style="color:var(--text-sub); font-size:13px;">~</span>
    <input type="date" id="endDate">
    <select id="branchSelect">
      <option value="전주">전주</option>
      <option value="전체">전체</option>
    </select>
    <button class="btn-search" onclick="loadData()">조회</button>
  </div>

  <!-- 통계 카드 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="label">청구 클레임</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">수거 완료</div>
      <div class="value" id="stat-ok">—</div>
    </div>
    <div class="stat-card">
      <div class="label">미수거</div>
      <div class="value" id="stat-fail">—</div>
    </div>
    <div class="stat-card">
      <div class="label">스캔 총계</div>
      <div class="value" id="stat-scan">—</div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-wrap">
    <button class="tab-btn active" id="tab-all" onclick="setFilter('all')">전체</button>
    <button class="tab-btn" id="tab-ok" onclick="setFilter('ok')">수거완료 ✓</button>
    <button class="tab-btn" id="tab-fail" onclick="setFilter('fail')">미수거 ✗</button>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <div class="loading" id="loading-state">
      <div class="spinner"></div>
      데이터를 불러오는 중...
    </div>
    <table id="main-table" style="display:none;">
      <thead>
        <tr>
          <th>클레임번호 (품번)</th>
          <th>차대번호(뒤7)</th>
          <th>품명</th>
          <th>작업자</th>
          <th>클레임생성일</th>
          <th>수거</th>
          <th>수거일자</th>
          <th>비고</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty" id="empty-state" style="display:none;">조회된 데이터가 없습니다.</div>
  </div>

</div>

<script>
  const SURL = 'https://dgmmcypqrqciuoqvmymj.supabase.co';
  const SKEY = 'sb_publishable_bZOge88xhSpIsiWtq5IIvw_K_CleTao';
  const sb = window.supabase.createClient(SURL, SKEY);

  let allData = [];
  let currentFilter = 'all';

  // 오늘 날짜 기본값
  const today = new Date().toISOString().slice(0, 10);
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
  document.getElementById('startDate').value = weekAgo;
  document.getElementById('endDate').value = today;

  window.onload = loadData;

  async function loadData() {
    showLoading();
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;

    let query = sb.from('qr_returns').select('*').order('created_at', { ascending: false });
    if (start) query = query.gte('교환일', start);
    if (end)   query = query.lte('교환일', end);

    const { data, error } = await query;
    if (error) { alert('데이터 오류: ' + error.message); return; }

    allData = data || [];
    updateStats();
    renderTable(currentFilter);
  }

  function updateStats() {
    const total = allData.length;
    const ok    = allData.filter(d => d.bmw_qr_code).length;
    const fail  = total - ok;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-ok').textContent    = ok;
    document.getElementById('stat-fail').textContent  = fail;
    document.getElementById('stat-scan').textContent  = ok; // 스캔된 건수 = 매칭 완료 건수
  }

  function setFilter(type) {
    currentFilter = type;
    document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn');
    if (type === 'all')  { document.getElementById('tab-all').classList.add('active'); }
    if (type === 'ok')   { document.getElementById('tab-ok').classList.add('active-success'); }
    if (type === 'fail') { document.getElementById('tab-fail').classList.add('active-danger'); }
    renderTable(type);
  }

  function renderTable(filter) {
    let rows = allData;
    if (filter === 'ok')   rows = allData.filter(d => d.bmw_qr_code);
    if (filter === 'fail') rows = allData.filter(d => !d.bmw_qr_code);

    const tbody = document.getElementById('table-body');
    const table = document.getElementById('main-table');
    const empty = document.getElementById('empty-state');
    document.getElementById('loading-state').style.display = 'none';

    if (!rows.length) {
      table.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    table.style.display = 'table';
    empty.style.display = 'none';

    // 수거일자: bmw_qr_code에서 날짜 파싱 (f[7] = YYMMDD)
    tbody.innerHTML = rows.map((item, i) => {
      const isOk = !!item.bmw_qr_code;
      let collectDate = '';
      if (isOk && item.bmw_qr_code) {
        const f = item.bmw_qr_code.split(',');
        if (f.length >= 8 && f[7] && f[7].length === 6) {
          collectDate = `20${f[7].substring(0,2)}-${f[7].substring(2,4)}-${f[7].substring(4,6)}`;
        }
        // created_at 기반 fallback
        if (!collectDate) collectDate = item.created_at ? item.created_at.slice(0,10) : '';
      }

      return `
        <tr style="animation: cardIn 0.3s ease ${i * 0.03}s both;">
          <td>
            <div class="claim-no">${item.id.slice(0,8).toUpperCase()}</div>
            <div class="part-code" style="margin-top:3px;">${item.품번}</div>
          </td>
          <td><span class="vin-code">${item.차대번호.slice(-7)}</span></td>
          <td style="font-size:13px;">${item.품명}</td>
          <td style="font-size:13px; color:var(--text-sub);">${item.작업자}</td>
          <td style="font-size:13px;">${item.교환일 || ''}</td>
          <td>
            ${isOk
              ? `<span class="badge badge-ok">✓ 수거완료</span>`
              : `<span class="badge badge-fail">✗ 미수거</span>`
            }
          </td>
          <td>
            ${collectDate
              ? `<span class="date-text">${collectDate}</span>`
              : `<span class="dash">—</span>`
            }
          </td>
          <td>
            ${!isOk ? `<span class="memo-text">고품 미수거</span>` : ''}
          </td>
        </tr>
      `;
    }).join('');
  }

  function showLoading() {
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('main-table').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
  }
</script>
</body>
</html>
